<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chewrock</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      font-family: 'Courier New', Courier, monospace;
      color: #e8e8e8;
    }

    .terminal {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 32px 40px;
      min-width: 360px;
      box-shadow: 0 0 40px rgba(0,255,136,0.08);
    }

    .terminal-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
    }
    .dot.red   { background: #ff5f56; }
    .dot.yellow{ background: #ffbd2e; }
    .dot.green { background: #27c93f; }

    .prompt {
      color: #555;
      font-size: 13px;
      margin-bottom: 8px;
    }

    #output {
      font-size: 22px;
      color: #00ff88;
      letter-spacing: 0.04em;
      min-height: 32px;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.2em;
      background: #00ff88;
      vertical-align: text-bottom;
      margin-left: 2px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .status {
      margin-top: 20px;
      font-size: 11px;
      color: #333;
    }
    .status.ok  { color: #27c93f; }
    .status.err { color: #ff5f56; }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="terminal-bar">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
    </div>
    <div class="prompt">$ curl http://localhost:3000/api/hello</div>
    <div id="output"><span class="cursor"></span></div>
    <div id="status" class="status">connecting...</div>
  </div>

  <script>
    const outputEl = document.getElementById('output');
    const statusEl = document.getElementById('status');

    async function fetchHello() {
      try {
        const res = await fetch('/api/hello');
        const data = await res.json();
        typeWriter(data.message);
        statusEl.textContent = '✓ 200 OK';
        statusEl.className = 'status ok';
      } catch (e) {
        outputEl.textContent = 'connection failed';
        statusEl.textContent = '✗ server unreachable';
        statusEl.className = 'status err';
      }
    }

    function typeWriter(text) {
      outputEl.innerHTML = '';
      let i = 0;
      const cursor = document.createElement('span');
      cursor.className = 'cursor';

      const interval = setInterval(() => {
        outputEl.textContent = text.slice(0, i + 1);
        outputEl.appendChild(cursor);
        i++;
        if (i >= text.length) clearInterval(interval);
      }, 60);
    }

    fetchHello();
  </script>
</body>
</html>
