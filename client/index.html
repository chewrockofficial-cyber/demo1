<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>chewrock</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --accent:  #6c63ff;
      --accent2: #a78bfa;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --radius:  12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }
    header h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }
    header p { color: var(--muted); margin-top: 8px; font-size: 0.95rem; }

    /* 인사 카드 */
    #hello-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 36px;
      text-align: center;
      width: 100%;
      max-width: 480px;
      margin-bottom: 32px;
      transition: border-color 0.2s;
    }
    #hello-card:hover { border-color: var(--accent); }
    #hello-msg {
      font-size: 1.5rem;
      font-weight: 700;
      min-height: 36px;
      color: var(--accent2);
    }

    /* 메시지 입력 */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 24px;
    }
    .card h2 { font-size: 1rem; color: var(--muted); margin-bottom: 14px; letter-spacing: .05em; text-transform: uppercase; }

    .input-row { display: flex; gap: 10px; }
    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }

    /* 메시지 목록 */
    #msg-list { list-style: none; margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
    #msg-list li {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #msg-list li .time { color: var(--muted); font-size: 0.78rem; white-space: nowrap; margin-left: 12px; }

    .empty { color: var(--muted); font-size: 0.88rem; text-align: center; padding: 12px 0; }
  </style>
</head>
<body>

  <header>
    <h1>chewrock</h1>
    <p>Web + Node.js + lowdb 스택 첫 걸음 🚀</p>
  </header>

  <!-- 인사 카드 -->
  <div id="hello-card">
    <div id="hello-msg">불러오는 중…</div>
  </div>

  <!-- 메시지 저장 -->
  <div class="card">
    <h2>메시지 남기기</h2>
    <div class="input-row">
      <input id="msg-input" type="text" placeholder="한 줄 메시지를 입력하세요" />
      <button onclick="sendMsg()">저장</button>
    </div>
  </div>

  <!-- 저장된 메시지 목록 -->
  <div class="card">
    <h2>저장된 메시지</h2>
    <ul id="msg-list"><li class="empty">아직 메시지가 없습니다.</li></ul>
  </div>

  <script>
    const API = ''   // 같은 origin이므로 prefix 불필요

    // 인사 불러오기
    async function fetchHello() {
      const res  = await fetch(`${API}/api/hello`)
      const data = await res.json()
      document.getElementById('hello-msg').textContent = data.message
    }

    // 메시지 목록 불러오기
    async function fetchMessages() {
      const res  = await fetch(`${API}/api/messages`)
      const list = await res.json()
      const ul   = document.getElementById('msg-list')

      if (!list.length) {
        ul.innerHTML = '<li class="empty">아직 메시지가 없습니다.</li>'
        return
      }

      ul.innerHTML = list.reverse().map(m => {
        const t = new Date(m.createdAt).toLocaleString('ko-KR')
        return `<li><span>${m.text}</span><span class="time">${t}</span></li>`
      }).join('')
    }

    // 메시지 저장
    async function sendMsg() {
      const input = document.getElementById('msg-input')
      const text  = input.value.trim()
      if (!text) return

      await fetch(`${API}/api/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      })
      input.value = ''
      fetchMessages()
    }

    // Enter 키 지원
    document.getElementById('msg-input')
      .addEventListener('keydown', e => e.key === 'Enter' && sendMsg())

    // 초기 로드
    fetchHello()
    fetchMessages()
  </script>
</body>
</html>
