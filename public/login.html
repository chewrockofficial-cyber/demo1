<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chew Rock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Galmuri11:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F5F3EE;
      --ink:      #1A1A1A;
      --muted:    #8A867E;
      --line:     #1A1A1A;
      --surface:  #FFFFFF;
      --field:    #F5F3EE;
      --lilac:    #B8A5E3;
      --lilac-d:  #8B73C7;
      --error:    #D45D5D;
    }

    body {
      font-family: 'Galmuri11', monospace;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--ink);
      image-rendering: pixelated;
    }

    .card {
      background: var(--surface);
      border: 2.5px solid var(--line);
      border-radius: 24px;
      padding: 32px 28px 28px;
      width: 100%;
      max-width: 380px;
      box-shadow: 6px 6px 0 var(--line);
    }

    /* 나비 캐릭터 */
    .character {
      text-align: center;
      margin-bottom: 4px;
    }
    .character img {
      width: 96px;
      height: 96px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* 로고 */
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo img {
      max-width: 180px;
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .tagline {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      letter-spacing: 0.5px;
    }

    /* 탭 */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border: 2px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }
    .tab {
      flex: 1;
      padding: 12px;
      border: none;
      font-family: 'Galmuri11', monospace;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: var(--surface);
      color: var(--muted);
      transition: all 0.15s;
    }
    .tab.active {
      background: var(--ink);
      color: var(--surface);
    }
    .tab:not(.active):hover {
      background: var(--field);
      color: var(--ink);
    }

    /* 폼 */
    .form { display: flex; flex-direction: column; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 12px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: 0.3px;
    }

    input {
      padding: 12px 14px;
      border: 2px solid var(--line);
      border-radius: 10px;
      font-family: 'Galmuri11', monospace;
      font-size: 14px;
      color: var(--ink);
      background: var(--surface);
      outline: none;
      transition: all 0.15s;
    }
    input::placeholder { color: #B8B4AB; }
    input:focus {
      background: #FAF8FF;
      box-shadow: 3px 3px 0 var(--lilac-d);
      transform: translate(-1px, -1px);
    }

    /* 에러 */
    .error-msg {
      font-size: 12px;
      color: var(--error);
      font-weight: 700;
      display: none;
      padding: 10px 12px;
      background: #FFF0F0;
      border: 2px solid var(--error);
      border-radius: 10px;
    }
    .error-msg.show { display: block; }

    /* 버튼 */
    .btn-submit {
      margin-top: 6px;
      padding: 14px;
      background: var(--lilac);
      color: var(--ink);
      border: 2.5px solid var(--line);
      border-radius: 12px;
      font-family: 'Galmuri11', monospace;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--line);
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 0.5px;
    }
    .btn-submit:hover { background: var(--lilac-d); color: var(--surface); }
    .btn-submit:active {
      transform: translate(4px, 4px);
      box-shadow: 0 0 0 var(--line);
    }
    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    #field-nickname { display: none; }

    /* 성공 */
    .success-banner {
      display: none;
      text-align: center;
      padding: 24px 0;
    }
    .success-banner.show { display: block; }
    .success-emoji {
      font-size: 36px;
      margin-bottom: 12px;
    }
    .success-text {
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .success-sub {
      font-size: 11px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="character">
      <img src="/images/nabi.png" alt="나비">
    </div>
    <div class="logo">
      <img src="/images/logo.png" alt="Chew Rock">
      <div class="tagline">오늘의 클라이밍을 기록해봐요</div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">로그인</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">회원가입</button>
    </div>

    <form class="form" id="auth-form" onsubmit="handleSubmit(event)">
      <div class="field" id="field-nickname">
        <label for="nickname">닉네임</label>
        <input id="nickname" type="text" placeholder="클라이밍 이름을 지어줘요" maxlength="20">
      </div>
      <div class="field">
        <label for="email">이메일</label>
        <input id="email" type="email" placeholder="example@email.com" required>
      </div>
      <div class="field">
        <label for="password">비밀번호</label>
        <input id="password" type="password" placeholder="8자 이상" required minlength="8">
      </div>
      <div class="error-msg" id="error-msg"></div>
      <button class="btn-submit" type="submit" id="btn-submit">로그인</button>
    </form>

    <div class="success-banner" id="success-banner">
      <div class="success-emoji">🐱</div>
      <div class="success-text" id="success-text">로그인 성공!</div>
      <div class="success-sub" id="success-sub">잠시 후 이동할게요</div>
    </div>
  </div>

  <script>
    let currentTab = 'login'
    function switchTab(tab) {
      currentTab = tab
      document.getElementById('tab-login').classList.toggle('active', tab === 'login')
      document.getElementById('tab-register').classList.toggle('active', tab === 'register')
      document.getElementById('field-nickname').style.display = tab === 'register' ? 'flex' : 'none'
      document.getElementById('btn-submit').textContent = tab === 'login' ? '로그인' : '가입하기'
      hideError()
    }
    function showError(msg) {
      const el = document.getElementById('error-msg')
      el.textContent = msg
      el.classList.add('show')
    }
    function hideError() { document.getElementById('error-msg').classList.remove('show') }
    async function handleSubmit(e) {
      e.preventDefault()
      hideError()
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const nickname = document.getElementById('nickname').value.trim()
      const btn = document.getElementById('btn-submit')
      if (currentTab === 'register' && !nickname) return showError('닉네임을 입력해주세요.')
      btn.disabled = true
      btn.textContent = '잠깐만요...'
      try {
        const endpoint = currentTab === 'login' ? '/api/auth/login' : '/api/auth/register'
        const body = currentTab === 'login' ? { email, password } : { email, password, nickname }
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        })
        const data = await res.json()
        if (!res.ok) return showError(data.error || '오류가 발생했어요.')
        localStorage.setItem('token', data.token)
        localStorage.setItem('user', JSON.stringify(data.user))
        document.getElementById('auth-form').style.display = 'none'
        const banner = document.getElementById('success-banner')
        banner.classList.add('show')
        document.getElementById('success-text').textContent =
          currentTab === 'login' ? `${data.user.nickname}님, 반가워요!` : `${data.user.nickname}님, 환영해요!`
        document.getElementById('success-sub').textContent =
          currentTab === 'login' ? '잠시 후 이동할게요' : '첫 클라이밍을 기록해봐요'
        setTimeout(() => { window.location.href = '/loading.html?next=/index.html&delay=1500' }, 1500)
 } catch (err) {
        showError('서버에 연결할 수 없어요. 잠시 후 다시 시도해주세요.')
      } finally {
        btn.disabled = false
        btn.textContent = currentTab === 'login' ? '로그인' : '가입하기'
      }
    }
  </script>
</body>
</html>
