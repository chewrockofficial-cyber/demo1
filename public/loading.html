<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chew Rock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Galmuri11:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #F5F3EE;
      --ink:   #1A1A1A;
      --muted: #8A867E;
    }

    body {
      font-family: 'Galmuri11', monospace;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--ink);
      gap: 24px;
    }

    .nabi-loader {
      width: 160px;
      height: 160px;
      position: relative;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .nabi-loader img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.05s;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .nabi-loader img.active {
      opacity: 1;
    }

    .loading-text {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20%   { content: ''; }
      40%       { content: '.'; }
      60%       { content: '..'; }
      80%, 100% { content: '...'; }
    }
  </style>
</head>
<body>
  <div class="nabi-loader" id="nabi-loader">
    <img src="/images/nabi_front_01.png" alt="">
    <img src="/images/nabi_front_02.png" alt="">
    <img src="/images/nabi_front_03.png" alt="">
    <img src="/images/nabi_front_04.png" alt="">
    <img src="/images/nabi_front_05.png" alt="">
  </div>
  <div class="loading-text">
    <span>로딩 중</span><span class="dots"></span>
  </div>

  <script>
    const images = document.querySelectorAll('.nabi-loader img')
    let currentIndex = 0

    function showNext() {
      images.forEach(img => img.classList.remove('active'))
      images[currentIndex].classList.add('active')
      currentIndex = (currentIndex + 1) % images.length
    }

    showNext()
    setInterval(showNext, 300)

    // 다음 페이지로 이동 (URL에 ?next= 가 있으면 그 페이지로, 없으면 그냥 머무름)
    const params = new URLSearchParams(window.location.search)
    const nextPage = params.get('next')
    const delay = parseInt(params.get('delay')) || 1500

    if (nextPage) {
      setTimeout(() => { window.location.href = nextPage }, delay)
    }
  </script>
</body>
</html>
