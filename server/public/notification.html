<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nabi — 알림</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
.px{font-family:'Press Start 2P',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#f0f0f0;display:flex;justify-content:center;min-height:100vh}
.phone{width:360px;height:740px;background:#fff;border:2px solid #ddd;border-radius:32px;margin:1rem auto;display:flex;flex-direction:column;overflow:hidden}
.header{display:flex;align-items:center;padding:30px 20px 12px;border-bottom:1.5px solid #eee;gap:12px;flex-shrink:0}
.back-btn{background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center}
.header-title{font-size:12px;color:#111;letter-spacing:1px}
.notif-list{flex:1;overflow-y:auto;padding:4px 0}
.notif-list::-webkit-scrollbar{width:4px}
.notif-list::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px}
.empty-icon{font-size:40px}
.empty-text{font-size:10px;color:#999;letter-spacing:1px}
.notif-item{display:flex;align-items:flex-start;gap:12px;padding:14px 20px;border-bottom:1px solid #f5f5f5;cursor:pointer;position:relative}
.notif-item:active{background:#fafafa}
.notif-item.unread::before{content:'';position:absolute;left:8px;top:50%;transform:translateY(-50%);width:6px;height:6px;background:#ff4444;border-radius:50%}
.notif-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.notif-icon.hold{background:#FFF3E0}
.notif-icon.gym{background:#E8F5E9}
.notif-icon.upgrade{background:#E3F2FD}
.notif-icon.chalk{background:#F3E5F5}
.notif-icon.group{background:#FCE4EC}
.notif-icon.friend{background:#E0F7FA}
.notif-content{flex:1}
.notif-msg{font-size:10px;color:#222;line-height:1.7;word-break:keep-all}
.notif-msg strong{color:#111}
.notif-time{font-size:9px;color:#bbb;margin-top:4px}
.friend-btns{display:flex;gap:8px;margin-top:8px}
.btn-accept,.btn-reject{padding:6px 12px;border-radius:6px;font-size:8px;border:none;cursor:pointer;font-family:'Press Start 2P',monospace}
.btn-accept{background:#111;color:#fff}
.btn-reject{background:#f0f0f0;color:#888}
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:flex-end;justify-content:center}
.modal-backdrop.show{display:flex}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 36px;width:360px;max-width:100vw}
.modal-handle{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:10px;color:#111;margin-bottom:8px}
.modal-sub{font-size:9px;color:#999;margin-bottom:16px;line-height:1.6}
.gym-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.gym-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid #eee;border-radius:12px;cursor:pointer;transition:border-color 0.15s}
.gym-item:hover{border-color:#111}
.gym-item.selected{border-color:#111;background:#fafafa}
.gym-icon{font-size:18px}
.gym-name{font-size:10px;color:#222}
.gym-members{font-size:9px;color:#bbb;margin-top:2px}
.modal-btns{display:flex;gap:8px}
.btn-confirm{flex:1;padding:12px;background:#111;color:#fff;border:none;border-radius:10px;font-size:8px;cursor:pointer;font-family:'Press Start 2P',monospace}
.btn-close-modal{flex:1;padding:12px;background:#f5f5f5;color:#666;border:none;border-radius:10px;font-size:8px;cursor:pointer;font-family:'Press Start 2P',monospace}
.btn-confirm:disabled{opacity:0.4;cursor:not-allowed}
.bottomnav{background:#fff;border-top:1.5px solid #eee;display:flex;padding:14px 0 20px;flex-shrink:0}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:4px 0;color:#bbb}
.nav-label{font-family:'Press Start 2P',monospace;font-size:8px}
.nav-item.active{color:#111}
.nav-item.active .nav-label{color:#111}
</style>
</head>

      <button class="btn-close-modal px" onclick="document.getElementById('modal-backdrop').classList.remove('show')">닫기</button>
    </div>
  </div>
</div>

<script>
const notifications=[
  {id:1,type:'hold',icon:'🪨',iconClass:'hold',msg:'줍줍 성공! 마을에서 <strong>저그 홀드</strong>를 주웠습니다.',holdName:'저그 홀드',time:'방금 전',unread:true},
  {id:2,type:'friend',icon:'👋',iconClass:'friend',msg:'<strong>까만나비</strong>님이 친구 요청을 보냈습니다.',time:'5분 전',unread:true},
  {id:3,type:'gym_join_me',icon:'🧗',iconClass:'gym',msg:'<strong>볼더링 클럽 강남</strong>에 가입했습니다. (함께 쓸 쵸크를 기부해보세요!)',time:'1시간 전',unread:false},
  {id:4,type:'chalk',icon:'🤍',iconClass:'chalk',msg:'<strong>5쵸크</strong>를 획득했습니다!',time:'2시간 전',unread:false},
  {id:5,type:'gym_join_other',icon:'🧗',iconClass:'gym',msg:'<strong>하얀나비</strong> 나비가 <strong>볼더링 클럽 강남</strong> 암장에 가입했습니다.',time:'3시간 전',unread:false},
  {id:6,type:'chalk_donate',icon:'🤍',iconClass:'chalk',msg:'<strong>회색나비</strong> 나비가 <strong>볼더링 클럽 강남</strong>암장에 <strong>10쵸크</strong>를 기부했습니다.',time:'어제',unread:false},
  {id:7,type:'upgrade',icon:'⬆️',iconClass:'upgrade',msg:'<strong>볼더링 클럽 강남</strong> 암장이 <strong>암장 2단계</strong>로 업그레이드 됐습니다.',time:'어제',unread:false},
  {id:8,type:'group',icon:'👕',iconClass:'group',msg:'나비가 모여 단체가 되었습니다. 단체티를 선물해 드립니다!',time:'3일 전',unread:false},
  {id:9,type:'gym_create',icon:'🏔️',iconClass:'gym',msg:'<strong>락 스튜디오 합정</strong> 암장을 개업했습니다. (다른 나비를 초대해보세요!)',time:'7일 전',unread:false}
]
function render(){
  const list=document.getElementById('notif-list')
  if(!notifications.length){
    list.innerHTML='<div class="empty-state"><div class="empty-icon">🔔</div><div class="px empty-text">텅!</div><div style="font-size:10px;color:#bbb;margin-top:4px">아직 알림이 없어요</div></div>'
    return
  }
  list.innerHTML=notifications.map(n=>{
    if(n.type==='friend') return `<div class="notif-item ${n.unread?'unread':''}" data-id="${n.id}"><div class="notif-icon ${n.iconClass}">${n.icon}</div><div class="notif-content"><div class="notif-msg">${n.msg}</div><div class="friend-btns"><button class="btn-accept px" onclick="acceptFriend(${n.id},event)">수락</button><button class="btn-reject px" onclick="rejectFriend(${n.id},event)">거절</button></div><div class="notif-time">${n.time}</div></div></div>`
    if(n.type==='hold') return `<div class="notif-item ${n.unread?'unread':''}" data-id="${n.id}" onclick="openHoldModal('${n.holdName}',${n.id})"><div class="notif-icon ${n.iconClass}">${n.icon}</div><div class="notif-content"><div class="notif-msg">${n.msg}</div><div class="notif-time">${n.time} · 탭해서 암장 선택</div></div></div>`
    return `<div class="notif-item ${n.unread?'unread':''}" data-id="${n.id}"><div class="notif-icon ${n.iconClass}">${n.icon}</div><div class="notif-content"><div class="notif-msg">${n.msg}</div><div class="notif-time">${n.time}</div></div></div>`
  }).join('')
}
function acceptFriend(id,e){
  e.stopPropagation()
  document.querySelector(`[data-id="${id}"]`).querySelector('.notif-content').innerHTML='<div class="notif-msg">친구 요청을 <strong>수락</strong>했습니다. 🎉</div><div class="notif-time">방금 전</div>'
}
function rejectFriend(id,e){
  e.stopPropagation()
  const item=document.querySelector(`[data-id="${id}"]`)
  item.style.opacity='0.4'
  item.style.pointerEvents='none'
}
let selectedGym=null
function openHoldModal(holdName,id){
  document.getElementById('modal-hold-name').textContent=holdName
  selectedGym=null
  document.querySelectorAll('.gym-item').forEach(el=>el.classList.remove('selected'))
  document.getElementById('btn-confirm').disabled=true
  document.getElementById('modal-backdrop').classList.add('show')
  const item=document.querySelector(`[data-id="${id}"]`)
  if(item) item.classList.remove('unread')
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modal-backdrop')) return
  document.getElementById('modal-backdrop').classList.remove('show')
}
function selectGym(el,gymName){
  document.querySelectorAll('.gym-item').forEach(g=>g.classList.remove('selected'))
  el.classList.add('selected')
  selectedGym=gymName
  document.getElementById('btn-confirm').disabled=false
}
function confirmGym(){
  if(!selectedGym) return
  document.getElementById('modal-backdrop').classList.remove('show')
  const toast=document.createElement('div')
  toast.textContent=`✅ ${selectedGym}에 배치했어요!`
  Object.assign(toast.style,{position:'fixed',bottom:'40px',left:'50%',transform:'translateX(-50%)',background:'#111',color:'#fff',padding:'12px 20px',borderRadius:'12px',fontSize:'10px',zIndex:'999',whiteSpace:'nowrap'})
  document.body.appendChild(toast)
  setTimeout(()=>toast.remove(),2500)
}
render()
</script>
</body>
</html>
