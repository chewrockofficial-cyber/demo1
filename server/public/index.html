<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nabi</title>
<style>
html, body {
  margin: 0; padding: 0;
  background: #f0f0f0;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}
</style>
</head>
<body>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
.px{font-family:'Press Start 2P',monospace}
*{box-sizing:border-box;margin:0;padding:0}
.phone{
  width:360px;height:740px;background:#fff;
  border:2px solid #ddd;border-radius:32px;
  margin:1rem auto;display:flex;flex-direction:column;overflow:hidden
}
.topbar{display:flex;justify-content:flex-end;align-items:center;padding:38px 38px 4px}
.notif-wrap{position:relative;display:inline-block}
.notif-dot{width:9px;height:9px;background:#ff4444;border:2px solid #fff;border-radius:50%;position:absolute;top:-2px;right:-2px}
.stage-area{text-align:center;padding:44px 0 2px}
.stage-text{font-size:13.5px;color:#111;letter-spacing:1px}
.stage-sub{font-size:7px;color:#888;margin-top:6px}
.pills{display:flex;gap:5px;justify-content:center;padding:10px 16px 4px;flex-wrap:wrap}
.pill{font-size:6px;padding:4px 7px;border-radius:4px;border:1.5px solid #ddd;color:#bbb;background:#f8f8f8;font-family:'Press Start 2P',monospace}
.pill.active{border-color:#222;color:#111;background:#fff}
.char-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
.nabi-img{width:130px;height:auto;image-rendering:pixelated;display:block}
.chalk-row{display:flex;align-items:center;gap:10px;margin-top:18px}
.chalk-img{width:34px;height:auto;image-rendering:pixelated;display:block}
.chalk-text{display:flex;align-items:baseline;gap:6px}
.chalk-count{font-size:15px;color:#111}
.chalk-unit{font-size:8px;color:#999}
.bottomnav{background:#fff;border-top:1.5px solid #eee;display:flex;padding:14px 0 20px}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:4px 0}
.nav-label{font-size:8px;color:#bbb;font-family:'Press Start 2P',monospace}
.nav-item.active .nav-label{color:#111}
.nav-item.active svg{color:#111}
svg{color:#bbb}
</style>

<div class="phone">
  <div class="topbar">
    <div class="notif-wrap">
      <svg width="30" height="30" viewBox="0 0 24 24" style="image-rendering:pixelated;display:block">
        <rect x="2" y="4" width="20" height="2" fill="#222"/>
        <rect x="2" y="4" width="2" height="14" fill="#222"/>
        <rect x="20" y="4" width="2" height="14" fill="#222"/>
        <rect x="2" y="16" width="20" height="2" fill="#222"/>
        <rect x="4" y="6" width="2" height="2" fill="#222"/>
        <rect x="6" y="8" width="2" height="2" fill="#222"/>
        <rect x="8" y="10" width="2" height="2" fill="#222"/>
        <rect x="10" y="12" width="4" height="2" fill="#222"/>
        <rect x="14" y="10" width="2" height="2" fill="#222"/>
        <rect x="16" y="8" width="2" height="2" fill="#222"/>
        <rect x="18" y="6" width="2" height="2" fill="#222"/>
      </svg>
      <div class="notif-dot"></div>
    </div>
  </div>

  <div class="stage-area">
    <div class="px stage-text">Powdered Nabi</div>
    <div class="px stage-sub">stage 3 / 5</div>
  </div>

  <div class="pills">
    <div class="pill">Fresh</div>
    <div class="pill">Dusted</div>
    <div class="pill active">Powdered</div>
    <div class="pill">Coated</div>
    <div class="pill">Caked</div>
  </div>

</div>

<script>
function setNav(i) {
  document.querySelectorAll('.nav-item').forEach((el, idx) => {
    el.classList.toggle('active', idx === i);
  });
}
</script>

</body>
