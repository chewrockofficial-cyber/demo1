<!DOCTYPE html>
<html lang="ko">
<head>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<style>
@font-face {
  font-family: 'Galmuri11';
  src: url('https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/Galmuri11.woff2') format('woff2');
  font-weight: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Galmuri11';
  src: url('https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/Galmuri11-Bold.woff2') format('woff2');
  font-weight: 700;
  font-display: swap;
}

/* ══════════════════════════════════
   Chew Rock Design System Override
   Galmuri11 + 픽셀 UI 통일
══════════════════════════════════ */
*, *::before, *::after {
  font-family: 'Galmuri11', 'Press Start 2P', monospace !important;
}
.px { font-family: 'Galmuri11', monospace !important; font-weight: 700 !important; }
button { border-radius: 0 !important; font-family: 'Galmuri11', monospace !important; font-weight: 700 !important; }
input, textarea { border-radius: 0 !important; font-family: 'Galmuri11', monospace !important; border: 2px solid #111 !important; }
input:focus, textarea:focus { outline: none !important; box-shadow: inset 2px 2px 0 #E0E0E0 !important; }
/* 각진 border-radius 제거 */
[class*="card"],[class*="panel"],[class*="modal"],[class*="chip"],
[class*="badge"],[class*="bubble"],[class*="tag"],[class*="bar"],
.member-chip,.sub-modal,.gym-panel,.notice-board,.item-box {
  border-radius: 0 !important;
}
/* 메뉴바 굵은 선 */
.bottomnav { border-top: 3px solid #111 !important; }
/* 토스트 픽셀 */
.toast { border-radius: 0 !important; border: 3px solid #333 !important; font-weight: 700 !important; box-shadow: 4px 4px 0 #555 !important; }
/* 진행바 각진 */
.chalk-bar-bg,[class*="-bar-bg"],[class*="-track"] { border-radius: 0 !important; border: 2px solid #111 !important; }
.chalk-bar,[class*="-bar"],[class*="-fill"] { border-radius: 0 !important; }
/* 버튼 픽셀 그림자 */
.btn-record,.btn-enter-gym,.btn-find,.btn-join-gym,[class*="btn-record"],[class*="btn-enter"] {
  border-radius: 0 !important;
  box-shadow: 4px 4px 0 #555 !important;
  font-weight: 700 !important;
}
/* 기록 탭 버튼들 */
button[onclick], .tab-btn { border-radius: 0 !important; }
/* 픽셀 이미지 렌더링 */
img { image-rendering: pixelated; }
/* 모달 각진 */
.gym-panel { border-radius: 0 !important; border-top-width: 3px !important; }
.sub-modal { border-radius: 0 !important; }
/* 인풋 각진 */
input[type=text], input[type=number], textarea, select {
  border-radius: 0 !important; border: 2px solid #111 !important;
  font-family: 'Galmuri11', monospace !important;
}
/* 난이도/조건 칩들 */
[class*="-chip"], [class*="-pill"], [class*="-tag"] { border-radius: 0 !important; }
/* 멤버 칩 각진 */
.member-chip { border-radius: 0 !important; }
/* 상점 카드 */
[class*="item-card"], [class*="product"] { border-radius: 0 !important; }

</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nabi</title>
<style>
html, body {
  margin: 0; padding: 0;
  background: #f0f0f0;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}
</style>
</head>
<body>
<style>
.px{font-family:'Press Start 2P',monospace}
*{box-sizing:border-box;margin:0;padding:0}
.phone{
  width:360px;height:740px;background:#fff;
  border:2px solid #ddd;border-radius:32px;
  margin:1rem auto;display:flex;flex-direction:column;overflow:hidden
}
.topbar{display:flex;justify-content:flex-end;align-items:center;padding:20px 38px 4px}
.notif-wrap{position:relative;display:inline-block}
.notif-dot{width:9px;height:9px;background:#ff4444;border:2px solid #fff;border-radius:50%;position:absolute;top:-2px;right:-2px}
.stage-area{text-align:center;padding:30px 0 2px}
.stage-text{font-size:13.5px;color:#111;letter-spacing:1px}
.stage-sub{font-size:7px;color:#888;margin-top:6px}
.pills{display:flex;gap:5px;justify-content:center;padding:10px 16px 4px;flex-wrap:wrap}
.pill{font-size:6px;padding:4px 7px;border-radius:4px;border:1.5px solid #ddd;color:#bbb;background:#f8f8f8;font-family:'Press Start 2P',monospace}
.pill.active{border-color:#222;color:#111;background:#fff}
.char-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
.nabi-img{width:170px;height:auto;image-rendering:pixelated;display:block}
.chalk-row{display:flex;align-items:center;gap:10px;margin-top:18px}
.chalk-img{width:40px;height:auto;image-rendering:pixelated;display:block}
.chalk-text{display:flex;align-items:baseline;gap:6px}
.chalk-count{font-size:15px;color:#111}
.chalk-unit{font-size:8px;color:#999}
.bottomnav{background:#fff;border-top:1.5px solid #eee;display:flex;padding:14px 0 20px}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:4px 0}
.nav-label{font-size:8px;color:#bbb;font-family:'Press Start 2P',monospace}
.nav-item.active .nav-label{color:#111}
.nav-item.active svg{color:#111}
svg{color:#bbb}
</style>
