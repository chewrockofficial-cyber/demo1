<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nabi — 기록</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
.px{font-family:'Press Start 2P',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#f0f0f0;display:flex;justify-content:center;min-height:100vh}
.phone{width:360px;height:740px;background:#fff;border:2px solid #ddd;border-radius:32px;margin:1rem auto;display:flex;flex-direction:column;overflow:hidden}
.header{display:flex;justify-content:space-between;align-items:center;padding:30px 20px 12px;flex-shrink:0}
.header-title{font-size:12px;color:#111;letter-spacing:1px}
.header-right{display:flex;align-items:center;gap:8px}
.streak-badge{display:flex;align-items:center;gap:4px;background:#fff8f0;border:1.5px solid #ffd180;border-radius:8px;padding:5px 9px}
.streak-text{font-size:8px;color:#e65100}
.chalk-badge{display:flex;align-items:center;gap:4px;background:#f8f8f8;border:1.5px solid #ddd;border-radius:8px;padding:5px 9px}
.chalk-text{font-size:8px;color:#111}
.today-card{margin:0 16px 12px;background:#fafafa;border:1.5px solid #eee;border-radius:16px;padding:16px;flex-shrink:0}
.today-status{font-size:9px;color:#888;margin-bottom:6px;line-height:1.6}
.today-status strong{color:#111}
.btn-record{width:100%;padding:12px;background:#111;color:#fff;border:none;border-radius:12px;font-size:9px;cursor:pointer;letter-spacing:1px;margin-top:10px}
.view-tabs{display:flex;margin:0 16px 10px;gap:6px;flex-shrink:0}
.view-tab{flex:1;padding:8px;border:1.5px solid #ddd;border-radius:10px;background:#f8f8f8;color:#bbb;font-size:8px;text-align:center;cursor:pointer;letter-spacing:0.5px}
.view-tab.active{border-color:#111;background:#fff;color:#111}
.scroll-area{flex:1;overflow-y:auto;padding:0 16px 8px}
.scroll-area::-webkit-scrollbar{width:4px}
.scroll-area::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;padding:40px 20px}
.empty-icon{font-size:44px}
.empty-title{font-size:9px;color:#999;letter-spacing:0.5px;text-align:center;line-height:1.8}
.btn-first-record{margin-top:8px;padding:11px 20px;background:#111;color:#fff;border:none;border-radius:12px;font-size:8px;cursor:pointer}
.record-card{background:#fff;border:1.5px solid #eee;border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer}
.record-card:active{background:#fafafa}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-date{font-size:8px;color:#bbb}
.card-gym{font-size:11px;color:#111;margin-top:3px}
.card-reward{display:flex;align-items:center;gap:4px;background:#fff8f0;border:1.5px solid #ffd180;border-radius:8px;padding:4px 8px}
.card-reward-text{font-size:8px;color:#e65100}
.card-photo{width:100%;height:100px;background:#f5f5f5;border-radius:10px;margin-bottom:10px;display:flex;align-items:center;justify-content:center}
.card-photo-empty{font-size:28px;opacity:0.4}
.card-stats{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.card-stat{display:flex;align-items:center;gap:4px;background:#f8f8f8;border-radius:8px;padding:5px 8px}
.card-stat-text{font-size:8px;color:#555}
.card-memo{font-size:10px;color:#666;line-height:1.6;border-top:1px solid #f0f0f0;padding-top:8px}
.nabi-grow-badge{display:inline-flex;align-items:center;gap:4px;background:#f0f8ff;border:1.5px solid #90caf9;border-radius:8px;padding:4px 8px;margin-top:8px}
.nabi-grow-text{font-size:8px;color:#1565c0}
.calendar-wrap{padding:4px 0}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cal-month{font-size:10px;color:#111}
.cal-nav{background:none;border:none;cursor:pointer;font-size:14px;color:#888;padding:4px 8px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-day-label{text-align:center;font-size:7px;color:#bbb;padding:4px 0}
.cal-day{text-align:center;padding:6px 2px;border-radius:8px;cursor:pointer;position:relative}
.cal-day.today{background:#111}
.cal-day.today .day-num{color:#fff}
.day-num{font-size:9px;color:#333}
.day-dot{width:5px;height:5px;margin:2px auto 0;border-radius:50%;background:transparent}
.cal-day.has-record .day-dot{background:#e65100}
.cal-day.selected{background:#f5f5f5;border:1.5px solid #ddd}
.cal-selected-records{margin-top:12px;border-top:1px solid #eee;padding-top:12px}
.cal-selected-title{font-size:8px;color:#888;margin-bottom:8px}
.cal-record-item{display:flex;align-items:center;gap:10px;padding:10px;background:#fafafa;border-radius:10px;margin-bottom:6px;cursor:pointer}
.cal-record-gym{font-size:10px;color:#111}
.cal-record-sub{font-size:8px;color:#bbb;margin-top:2px}
.cal-empty{font-size:9px;color:#bbb;text-align:center;padding:20px 0}
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-backdrop.show{display:flex}
.modal{background:#fff;border-radius:24px 24px 0 0;width:360px;max-width:100vw;max-height:90vh;display:flex;flex-direction:column}
.modal-handle{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:16px auto 0}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 12px;border-bottom:1px solid #f0f0f0;flex-shrink:0}
.modal-title{font-size:10px;color:#111;letter-spacing:1px}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:#bbb}
.modal-body{overflow-y:auto;padding:16px 20px;flex:1}
.modal-footer{padding:12px 20px 32px;border-top:1px solid #f0f0f0;flex-shrink:0}
.form-section{margin-bottom:16px}
.form-label{font-size:8px;color:#888;margin-bottom:6px;letter-spacing:0.5px}
.photo-upload{width:100%;height:110px;border:2px dashed #ddd;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;background:#fafafa}
.photo-upload-icon{font-size:28px;opacity:0.5}
.photo-upload-text{font-size:8px;color:#bbb}
.form-input{width:100%;padding:12px 14px;border:1.5px solid #eee;border-radius:12px;font-size:12px;color:#111;background:#fff;outline:none;font-family:inherit}
.form-input:focus{border-color:#111}
.form-input::placeholder{color:#ccc}
.route-counter{display:flex;align-items:center;border:1.5px solid #eee;border-radius:12px;overflow:hidden}
.route-btn{width:44px;height:44px;background:#f8f8f8;border:none;cursor:pointer;font-size:18px;color:#555}
.route-num{flex:1;text-align:center;font-size:14px;color:#111;font-family:'Press Start 2P',monospace}
.optional-toggle{display:flex;align-items:center;gap:6px;padding:10px 0;cursor:pointer;color:#bbb;font-size:9px;border:none;background:none;width:100%}
.optional-section{display:none}
.optional-section.show{display:block}
.form-select{width:100%;padding:12px 14px;border:1.5px solid #eee;border-radius:12px;font-size:12px;color:#111;background:#fff;outline:none;font-family:inherit}
.btn-save{width:100%;padding:14px;background:#111;color:#fff;border:none;border-radius:14px;font-size:9px;cursor:pointer;letter-spacing:1px}
.detail-modal{background:#fff;border-radius:24px 24px 0 0;width:360px;max-width:100vw;max-height:85vh;display:flex;flex-direction:column}
.detail-photo{width:100%;height:160px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:48px;opacity:0.3;flex-shrink:0}
.detail-body{padding:20px;overflow-y:auto;flex:1}
.detail-gym{font-size:13px;color:#111;margin-bottom:4px}
.detail-date{font-size:9px;color:#bbb;margin-bottom:16px}
.detail-stats{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.detail-stat{display:flex;align-items:center;gap:5px;background:#f8f8f8;border-radius:10px;padding:7px 10px}
.detail-stat-text{font-size:9px;color:#555}
.detail-memo{font-size:11px;color:#444;line-height:1.8;background:#fafafa;border-radius:12px;padding:14px;margin-bottom:14px}
.detail-rewards{display:flex;gap:8px;flex-wrap:wrap}
.detail-reward{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:8px;font-size:8px}
.detail-reward.chalk{background:#fff8f0;border:1.5px solid #ffd180;color:#e65100}
.detail-reward.nabi{background:#f0f8ff;border:1.5px solid #90caf9;color:#1565c0}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:12px 20px;border-radius:14px;font-size:9px;z-index:999;white-space:nowrap;display:none;letter-spacing:0.5px}
.toast.show{display:block}
.bottomnav{background:#fff;border-top:1.5px solid #eee;display:flex;padding:14px 0 20px;flex-shrink:0}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:4px 0;color:#bbb}
.nav-label{font-family:'Press Start 2P',monospace;font-size:8px}
.nav-item.active{color:#111}
.nav-item.active .nav-label{color:#111}
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <div class="px header-title">기록</div>
    <div class="header-right">
      <div class="streak-badge"><span>🔥</span><span class="px streak-text" id="streakText">3일 연속</span></div>
      <div class="chalk-badge"><span>🤍</span><span class="px chalk-text" id="chalkText">12꼬집</span></div>
    </div>
  </div>
  <div class="today-card">
    <div class="today-status" id="todayStatus">오늘 아직 클라이밍 기록이 없어요<br><strong>기록하면 나비가 한 단계 성장해요 🐱</strong></div>
    <button class="px btn-record" onclick="openWriteModal()">오늘 기록하기</button>
  </div>
  <div class="view-tabs">
    <div class="px view-tab active" id="tab-feed" onclick="switchView('feed')">피드</div>
    <div class="px view-tab" id="tab-cal" onclick="switchView('calendar')">캘린더</div>
  </div>
  <div class="scroll-area" id="scrollArea">
    <div id="feedView"></div>
    <div id="calView" style="display:none"></div>
  </div>
  <div class="bottomnav">
    <div class="nav-item" onclick="window.location.href='/'">
      <svg width="32" height="32" viewBox="0 0 32 32"><path d="M16 4 C22 3, 27 7, 27 13 C27 18, 24 21, 19 22 L19 27 C19 28.5, 17.8 29, 16 29 C14.2 29, 13 28.5, 13 27 L13 22 C8 21, 5 18, 5 13 C5 7, 10 3.5, 16 4 Z" fill="currentColor"/><circle cx="16" cy="13" r="2.6" fill="#fff"/></svg>
      <div class="nav-label">메인</div>
    </div>
    <div class="nav-item active">
      <svg width="32" height="32" viewBox="0 0 32 32"><path d="M16 3 C24 2, 29 9, 28 16 C27 24, 21 29, 14 28 C7 27, 2 21, 3 14 C4 8, 9 4, 16 3 Z" fill="currentColor"/><path d="M16 9 L16 16 L22 19" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="16" cy="16" r="2.4" fill="#fff"/></svg>
      <div class="nav-label">기록</div>
    </div>
    <div class="nav-item" onclick="window.location.href='gym.html'">
      <svg width="32" height="32" viewBox="0 0 32 32"><path d="M5 12 C5 9, 7 7, 10 7 L19 7 C23 7, 25 9.5, 28 12 C25 14.5, 23 17, 19 17 L10 17 C7 17, 5 15, 5 12 Z" fill="currentColor"/><rect x="9" y="17" width="4" height="9" rx="1.5" fill="currentColor"/><circle cx="13" cy="12" r="2.3" fill="#fff"/></svg>
      <div class="nav-label">마을</div>
    </div>
    <div class="nav-item" onclick="window.location.href='shop.html'">
      <svg width="32" height="32" viewBox="0 0 32 32"><path d="M9 6 C14 3, 20 4, 24 8 C28 12, 27 19, 23 23 C19 27, 12 28, 8 24 C4 20, 4 13, 9 6 Z" fill="currentColor"/><circle cx="12" cy="11" r="1.8" fill="#fff"/><circle cx="19" cy="9" r="1.5" fill="#fff"/><circle cx="22" cy="16" r="1.8" fill="#fff"/><circle cx="16" cy="20" r="1.6" fill="#fff"/><circle cx="10" cy="18" r="1.4" fill="#fff"/></svg>
      <div class="nav-label">상점</div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="writeModalBackdrop" onclick="closeWriteModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="px modal-title">오늘 기록하기</div>
      <button class="modal-close" onclick="closeWriteModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-section">
        <div class="px form-label">사진 / 영상</div>
        <div class="photo-upload" onclick="alert('사진 업로드는 다음 업데이트에서 지원할게요! 📸')">
          <div class="photo-upload-icon">📷</div>
          <div class="px photo-upload-text">탭해서 사진 추가</div>
        </div>
      </div>
      <div class="form-section">
        <div class="px form-label">클라이밍장</div>
        <input class="form-input" id="inputGym" type="text" placeholder="예) 더클라임 강남">
      </div>
      <div class="form-section">
        <div class="px form-label">날짜</div>
        <input class="form-input" id="inputDate" type="date">
      </div>
      <div class="form-section">
        <div class="px form-label">완등한 루트 수</div>
        <div class="route-counter">
          <button class="route-btn" onclick="changeRoute(-1)">−</button>
          <div class="px route-num" id="routeNum">0</div>
          <button class="route-btn" onclick="changeRoute(1)">+</button>
        </div>
      </div>
      <div class="form-section">
        <div class="px form-label">메모</div>
        <textarea class="form-input" id="inputMemo" rows="3" placeholder="오늘 클라이밍 어땠나요?"></textarea>
      </div>
      <button class="px optional-toggle" onclick="toggleOptional()">
        <span id="optToggleIcon">▶</span> 추가 정보 (선택)
      </button>
      <div class="optional-section" id="optionalSection">
        <div class="form-section" style="margin-top:12px">
          <div class="px form-label">난이도</div>
          <select class="form-select" id="inputDiff"><option value="">선택 안함</option><option>초급</option><option>중급</option><option>상급</option><option>최상급</option></select>
        </div>
        <div class="form-section">
          <div class="px form-label">컨디션</div>
          <select class="form-select" id="inputCond"><option value="">선택 안함</option><option>😊 최고</option><option>🙂 좋음</option><option>😐 보통</option><option>😪 피곤</option></select>
        </div>
        <div class="form-section">
          <div class="px form-label">운동 시간 (분)</div>
          <input class="form-input" id="inputDur" type="number" placeholder="예) 90" min="0">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="px btn-save" onclick="saveRecord()">기록 저장하기</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="detailModalBackdrop" onclick="closeDetailModal(event)">
  <div class="detail-modal" onclick="event.stopPropagation()">
    <div class="modal-handle" style="margin-bottom:0"></div>
    <div class="detail-photo">🧗</div>
    <div class="detail-body">
      <div class="detail-gym" id="detailGym"></div>
      <div class="px detail-date" id="detailDate"></div>
      <div class="detail-stats" id="detailStats"></div>
      <div class="detail-memo" id="detailMemo"></div>
      <div class="detail-rewards" id="detailRewards"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let state={nabiStage:3,chalkCount:12,streakDays:3,todayRecorded:false,totalRecordCount:4,rewardHistory:[],records:[{id:1,date:'2026-06-29',gym:'더클라임 강남',routes:5,memo:'오랜만에 오버행 성공! 손이 많이 까졌지만 뿌듯하다',diff:'중급',cond:'😊 최고',duration:90,chalkReward:1,nabiGrew:true},{id:2,date:'2026-06-27',gym:'볼더링 클럽 홍대',routes:3,memo:'처음 와봤는데 홀드가 신선해서 좋았음',diff:'초급',cond:'🙂 좋음',duration:60,chalkReward:0,nabiGrew:true},{id:3,date:'2026-06-25',gym:'클라이밍 파크 강남',routes:8,memo:'친구랑 같이 와서 더 재밌었다. 5번 루트 드디어 완등!',diff:'상급',cond:'😊 최고',duration:120,chalkReward:1,nabiGrew:false}]}
let routeCount=0,currentView='feed',selectedCalDate=null,calYear=2026,calMonth=7

function init(){
  document.getElementById('inputDate').value=todayStr()
  updateHeader();renderFeed();renderCalendar()
}
function todayStr(){return new Date().toISOString().split('T')[0]}
function updateHeader(){
  document.getElementById('streakText').textContent=state.streakDays+'일 연속'
  document.getElementById('chalkText').textContent=state.chalkCount+'꼬집'
  document.getElementById('todayStatus').innerHTML=state.todayRecorded
    ?'오늘 클라이밍 기록을 남겼어요 🎉<br><strong>나비가 잘 자라고 있어요!</strong>'
    :'오늘 아직 클라이밍 기록이 없어요<br><strong>기록하면 나비가 한 단계 성장해요 🐱</strong>'
}
function switchView(v){
  currentView=v
  document.getElementById('tab-feed').classList.toggle('active',v==='feed')
  document.getElementById('tab-cal').classList.toggle('active',v==='calendar')
  document.getElementById('feedView').style.display=v==='feed'?'block':'none'
  document.getElementById('calView').style.display=v==='calendar'?'block':'none'
}
function renderFeed(){
  const el=document.getElementById('feedView')
  if(!state.records.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">🧗</div><div class="px empty-title">아직 기록이 없어요<br><br>첫 클라이밍 기록을 남기고<br>나비를 성장시켜보세요!</div><button class="px btn-first-record" onclick="openWriteModal()">첫 기록 남기기</button></div>'
    return
  }
  el.innerHTML=state.records.map(r=>`
    <div class="record-card" onclick="openDetailModal(${r.id})">
      <div class="card-header">
        <div><div class="px card-date">${r.date}</div><div class="card-gym">${r.gym}</div></div>
        ${r.chalkReward>0?`<div class="card-reward"><span>🤍</span><span class="px card-reward-text">+${r.chalkReward}꼬집</span></div>`:''}
      </div>
      <div class="card-photo"><div class="card-photo-empty">📷</div></div>
      <div class="card-stats">
        <div class="card-stat"><span>🪨</span><span class="px card-stat-text">${r.routes}개 루트</span></div>
        ${r.diff?`<div class="card-stat"><span>📊</span><span class="px card-stat-text">${r.diff}</span></div>`:''}
        ${r.duration?`<div class="card-stat"><span>⏱</span><span class="px card-stat-text">${r.duration}분</span></div>`:''}
      </div>
      ${r.memo?`<div class="card-memo">${r.memo}</div>`:''}
      ${r.nabiGrew?`<div class="nabi-grow-badge"><span>🐱</span><span class="px nabi-grow-text">나비 성장!</span></div>`:''}
    </div>`).join('')
}
function renderCalendar(){
  const el=document.getElementById('calView')
  const recordDates=new Set(state.records.map(r=>r.date))
  const today=todayStr()
  const firstDay=new Date(calYear,calMonth-1,1).getDay()
  const daysInMonth=new Date(calYear,calMonth,0).getDate()
  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월']
  const dayLabels=['일','월','화','수','목','금','토']
  let days=''
  for(let i=0;i<firstDay;i++) days+='<div></div>'
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calYear}-${String(calMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`
    days+=`<div class="cal-day ${ds===today?'today':''} ${recordDates.has(ds)?'has-record':''} ${ds===selectedCalDate?'selected':''}" onclick="selectCalDate('${ds}')"><div class="day-num">${d}</div><div class="day-dot"></div></div>`
  }
  let sel=''
  if(selectedCalDate){
    const dr=state.records.filter(r=>r.date===selectedCalDate)
    sel=dr.length
      ?`<div class="cal-selected-records"><div class="px cal-selected-title">${selectedCalDate} 기록 ${dr.length}개</div>${dr.map(r=>`<div class="cal-record-item" onclick="openDetailModal(${r.id})"><span style="font-size:20px">🧗</span><div><div class="cal-record-gym">${r.gym}</div><div class="px cal-record-sub">${r.routes}개 루트 · ${r.diff||'난이도 미입력'}</div></div></div>`).join('')}</div>`
      :`<div class="cal-selected-records"><div class="px cal-empty">이 날은 기록이 없어요</div></div>`
  }
  el.innerHTML=`<div class="calendar-wrap"><div class="cal-header"><button class="px cal-nav" onclick="changeMonth(-1)">◀</button><div class="px cal-month">${calYear}. ${monthNames[calMonth-1]}</div><button class="px cal-nav" onclick="changeMonth(1)">▶</button></div><div class="cal-grid">${dayLabels.map(d=>`<div class="px cal-day-label">${d}</div>`).join('')}${days}</div>${sel}</div>`
}
function selectCalDate(d){selectedCalDate=selectedCalDate===d?null:d;renderCalendar()}
function changeMonth(dir){calMonth+=dir;if(calMonth>12){calMonth=1;calYear++}if(calMonth<1){calMonth=12;calYear--}renderCalendar()}
function openWriteModal(){
  routeCount=0
  document.getElementById('routeNum').textContent='0'
  document.getElementById('inputGym').value=''
  document.getElementById('inputMemo').value=''
  document.getElementById('inputDate').value=todayStr()
  document.getElementById('writeModalBackdrop').classList.add('show')
}
function closeWriteModal(e){if(e&&e.target!==document.getElementById('writeModalBackdrop'))return;document.getElementById('writeModalBackdrop').classList.remove('show')}
function changeRoute(d){routeCount=Math.max(0,routeCount+d);document.getElementById('routeNum').textContent=routeCount}
function toggleOptional(){const s=document.getElementById('optionalSection');const show=!s.classList.contains('show');s.classList.toggle('show',show);document.getElementById('optToggleIcon').textContent=show?'▼':'▶'}
function saveRecord(){
  const gym=document.getElementById('inputGym').value.trim()
  const date=document.getElementById('inputDate').value
  const memo=document.getElementById('inputMemo').value.trim()
  const diff=document.getElementById('inputDiff').value
  const cond=document.getElementById('inputCond').value
  const dur=parseInt(document.getElementById('inputDur').value)||0
  if(!gym){alert('클라이밍장 이름을 입력해주세요!');return}
  if(!date){alert('날짜를 입력해주세요!');return}
  const isToday=date===todayStr()
  let nabiGrew=false
  if(isToday&&!state.todayRecorded&&state.nabiStage<5){state.nabiStage++;state.todayRecorded=true;nabiGrew=true}
  state.totalRecordCount++
  const r={id:Date.now(),date,gym,routes:routeCount,memo,diff,cond,duration:dur,chalkReward:0,nabiGrew}
  for(const m of[5,10,20]){if(state.totalRecordCount===m&&!state.rewardHistory.includes('total_record_'+m)){state.chalkCount++;r.chalkReward=1;state.rewardHistory.push('total_record_'+m);break}}
  state.records.unshift(r)
  document.getElementById('writeModalBackdrop').classList.remove('show')
  let msg='🎉 오늘의 클라이밍이 저장됐어요!'
  if(nabiGrew) msg='🐱 나비가 한 단계 성장했어요!'
  if(r.chalkReward>0) msg='🤍 +1꼬집을 획득했어요!'
  showToast(msg);updateHeader();renderFeed();renderCalendar()
}
function openDetailModal(id){
  const r=state.records.find(r=>r.id===id);if(!r)return
  document.getElementById('detailGym').textContent=r.gym
  document.getElementById('detailDate').textContent=r.date
  document.getElementById('detailStats').innerHTML=`<div class="detail-stat"><span>🪨</span><span class="px detail-stat-text">${r.routes}개 루트</span></div>${r.diff?`<div class="detail-stat"><span>📊</span><span class="px detail-stat-text">${r.diff}</span></div>`:''} ${r.cond?`<div class="detail-stat"><span>${r.cond}</span></div>`:''} ${r.duration?`<div class="detail-stat"><span>⏱</span><span class="px detail-stat-text">${r.duration}분</span></div>`:''}`
  document.getElementById('detailMemo').textContent=r.memo||'메모 없음'
  document.getElementById('detailRewards').innerHTML=`${r.chalkReward>0?`<div class="detail-reward chalk">🤍 +${r.chalkReward}꼬집 획득</div>`:''}${r.nabiGrew?`<div class="detail-reward nabi">🐱 나비 성장!</div>`:''}`
  document.getElementById('detailModalBackdrop').classList.add('show')
}
function closeDetailModal(e){if(e&&e.target!==document.getElementById('detailModalBackdrop'))return;document.getElementById('detailModalBackdrop').classList.remove('show')}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
init()
</script>
</body>
</html>
