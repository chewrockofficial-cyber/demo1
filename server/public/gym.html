<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nabi — 마을</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
.px{font-family:'Press Start 2P',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#f0f0f0;display:flex;justify-content:center;min-height:100vh}
.phone{width:360px;height:740px;border:2px solid #ddd;border-radius:32px;margin:1rem auto;overflow:hidden;position:relative;background:#fff;display:flex;flex-direction:column}

/* ── 마을 화면 ── */
.world-wrap{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
.world-wrap::-webkit-scrollbar{display:none}
.world{width:360px;min-height:700px;position:relative;background:#fff}

.hud{position:sticky;top:0;z-index:50;padding:22px 18px 8px;display:flex;justify-content:space-between;align-items:flex-start;background:linear-gradient(rgba(255,255,255,0.97) 80%,transparent);pointer-events:none}
.hud *{pointer-events:auto}
.hud-title{font-size:11px;color:#111;letter-spacing:1px}
.hud-sub{font-size:7px;color:#666;margin-top:4px}
.hud-badge{display:flex;align-items:center;gap:4px;background:#fff;border:2px solid #222;padding:5px 9px}
.hud-badge-text{font-size:8px;color:#111}

.building{position:absolute;z-index:10;cursor:pointer;transition:filter 0.15s}
.building:hover{filter:brightness(1.05) drop-shadow(0 0 8px rgba(255,200,0,0.55))}
.building img{image-rendering:pixelated;display:block}
.b-tip{position:absolute;top:-26px;left:50%;transform:translateX(-50%);background:#fff;border:2px solid #222;padding:3px 8px;font-size:7px;color:#111;white-space:nowrap;box-shadow:2px 2px 0 #222;opacity:0;transition:opacity 0.15s;pointer-events:none;z-index:20}
.building:hover .b-tip{opacity:1}

.nabi-wrap{position:absolute;z-index:15;display:flex;flex-direction:column;align-items:center}
.nabi-img{image-rendering:pixelated;filter:drop-shadow(1px 3px 0 rgba(0,0,0,0.18))}
.nabi-shadow{width:50px;height:5px;background:rgba(0,0,0,0.1);border-radius:50%;margin-top:-2px;filter:blur(2px)}

.evt{position:absolute;z-index:12;image-rendering:pixelated;animation:efloat 3s ease-in-out infinite}
@keyframes efloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* ── 암장 내부 화면 ── */
.gym-interior{
  display:none;position:absolute;inset:0;z-index:60;
  background:#f5f3f0;flex-direction:column;
}
.gym-interior.show{display:flex}

.interior-header{
  display:flex;align-items:center;gap:12px;
  padding:24px 18px 12px;
  background:#fff;border-bottom:2px solid #222;
  flex-shrink:0;
}
.interior-back{background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center}
.interior-title{font-size:10px;color:#111;letter-spacing:0.5px}
.interior-lv{background:#ffd180;border:2px solid #222;padding:3px 8px;font-size:8px;color:#111;box-shadow:1px 1px 0 #222;margin-left:auto}

.interior-scroll{flex:1;overflow-y:auto;scrollbar-width:none}
.interior-scroll::-webkit-scrollbar{display:none}

/* 층 컨테이너 */
.floor-wrap{
  border-bottom:3px solid #222;
  background:#fff;
  position:relative;
}
.floor-label{
  position:absolute;top:12px;left:14px;z-index:5;
  background:#222;color:#fff;
  font-size:7px;padding:3px 8px;
  border-radius:2px;
}
.floor-label span{color:#ffd180}

/* 클라이밍 벽 */
.wall-section{
  padding:36px 14px 14px;
  display:flex;justify-content:center;
}
.wall-img{
  width:100%;max-width:310px;
  image-rendering:pixelated;
  border:3px solid #222;
  border-radius:4px;
  display:block;
}

/* 게시판 */
.board-section{
  margin:0 14px 14px;
  background:#f8f6f0;
  border:2px solid #222;
  border-radius:6px;
  padding:12px;
}
.board-title{font-size:8px;color:#111;margin-bottom:8px}
.board-notes{display:flex;gap:6px;flex-wrap:wrap}
.note{
  padding:6px 8px;border-radius:3px;font-size:8px;
  color:#333;line-height:1.5;min-width:70px;
  border:1px solid rgba(0,0,0,0.1);
  box-shadow:1px 1px 0 rgba(0,0,0,0.1);
}

/* 아이템함 */
.item-box-section{
  margin:0 14px 18px;
  background:#f0ede8;
  border:2px solid #222;
  border-radius:6px;
  padding:12px;
}
.item-box-title{font-size:8px;color:#111;margin-bottom:8px}
.item-box-grid{display:flex;gap:8px;flex-wrap:wrap}
.item-slot{
  width:52px;height:52px;
  background:#fff;border:2px solid #ddd;
  border-radius:6px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;
  font-size:18px;cursor:pointer;
  transition:border-color 0.15s;
}
.item-slot:hover{border-color:#222}
.item-slot-label{font-size:6px;color:#888}
.item-slot.empty{opacity:0.4;cursor:default}

/* 공동 쵸크 바 (각 층 하단) */
.chalk-pool-bar{
  margin:0 14px 14px;
  background:#fff8f0;border:1.5px solid #ffd180;
  border-radius:6px;padding:10px 12px;
  display:flex;align-items:center;gap:10px;
}
.chalk-pool-icon{font-size:16px}
.chalk-pool-info{flex:1}
.chalk-pool-label{font-size:7px;color:#e65100;margin-bottom:4px}
.chalk-pool-track{background:#f0f0f0;height:7px;border-radius:4px;overflow:hidden}
.chalk-pool-fill{height:100%;background:linear-gradient(90deg,#ffd180,#ffb300);border-radius:4px}
.chalk-pool-count{font-size:8px;color:#111}

/* 층간 계단 표시 */
.stair-divider{
  display:flex;align-items:center;justify-content:center;
  padding:10px 0;background:#eee;
  border-top:2px solid #222;border-bottom:2px solid #222;
  gap:8px;
}
.stair-icon{font-size:16px}
.stair-label{font-size:7px;color:#666}

/* ── 암장 패널 ── */
.gym-panel{position:absolute;bottom:0;left:0;right:0;z-index:80;background:#fff;border-radius:20px 20px 0 0;border-top:3px solid #222;transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.34,1.2,0.64,1);max-height:500px;display:flex;flex-direction:column}
.gym-panel.show{transform:translateY(0)}
.panel-handle{width:40px;height:4px;background:#ddd;border:1px solid #ccc;border-radius:2px;margin:12px auto 0;flex-shrink:0;cursor:pointer}
.panel-scroll{overflow-y:auto;flex:1;padding:14px 18px 8px}
.panel-scroll::-webkit-scrollbar{width:4px}
.panel-scroll::-webkit-scrollbar-thumb{background:#ddd}
.panel-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.panel-name{font-size:12px;color:#111}
.panel-area{font-size:8px;color:#888;margin-top:3px}
.panel-close{background:none;border:none;cursor:pointer;font-size:20px;color:#999;line-height:1}
.panel-lv-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.panel-lv-badge{background:#ffd180;border:2px solid #222;padding:3px 10px;font-size:9px;color:#111;box-shadow:2px 2px 0 #222}
.panel-lv-desc{font-size:8px;color:#888}
.chalk-card{background:#fff8f0;border:2px solid #ffd180;border-radius:6px;padding:11px;margin-bottom:9px}
.chalk-ttl{font-size:8px;color:#e65100;margin-bottom:5px}
.chalk-amt-row{display:flex;align-items:baseline;gap:6px;margin-bottom:5px}
.chalk-amt{font-size:20px;color:#111}
.chalk-unit{font-size:8px;color:#888}
.chalk-bar-bg{background:#f0f0f0;border:1.5px solid #ddd;height:8px;margin-bottom:3px;overflow:hidden}
.chalk-bar{height:100%;background:repeating-linear-gradient(90deg,#ffd180 0,#ffb300 4px,#ffd180 8px);transition:width 0.5s}
.chalk-note{font-size:7px;color:#bbb}
.sec-lbl{font-size:8px;color:#888;margin-bottom:6px}
.members-row{display:flex;gap:6px;margin-bottom:9px;overflow-x:auto;padding-bottom:2px}
.members-row::-webkit-scrollbar{display:none}
.member-chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;background:#fafafa;border:2px solid #eee;padding:7px 8px}
.member-chip.me{border-color:#222}
.m-emoji{font-size:20px}
.m-name{font-size:7px;color:#555}
.m-streak{font-size:6px;color:#e65100}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:9px}
.menu-card{background:#fafafa;border:2px solid #eee;padding:11px;cursor:pointer;text-align:center}
.menu-card:active{background:#f0f0f0}
.m-icon{font-size:20px;margin-bottom:3px}
.m-title{font-size:8px;color:#111;margin-bottom:2px}
.m-sub{font-size:7px;color:#bbb;line-height:1.4}
.soon-tag{display:inline-block;font-size:6px;color:#bbb;background:#f0f0f0;border:1px solid #ddd;padding:2px 5px;margin-top:2px}
.btn-record{width:100%;padding:12px;background:#111;color:#fff;border:2px solid #222;font-size:8px;cursor:pointer;letter-spacing:0.5px;margin-bottom:4px}
.btn-enter-gym{width:100%;padding:12px;background:#4a8c5c;color:#fff;border:2px solid #222;font-size:8px;cursor:pointer;letter-spacing:0.5px;margin-bottom:6px}

/* ── 메뉴바 ── */
.bottomnav{flex-shrink:0;background:#fff;border-top:2px solid #eee;display:flex;padding:12px 0 18px;position:relative;z-index:200}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;padding:4px 0;color:#bbb}
.nav-label{font-family:'Press Start 2P',monospace;font-size:8px}
.nav-item.active{color:#111}
.nav-item.active .nav-label{color:#111}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 18px;border:2px solid #222;font-size:8px;z-index:999;white-space:nowrap;display:none}
.toast.show{display:block}
</style>
</head>
<body>
<div class="phone">

  <!-- 마을 메인 -->
  <div class="world-wrap" id="worldWrap">
    <div class="world" id="world">
      <div class="hud">
        <div><div class="px hud-title">마을</div><div class="hud-sub">암장을 탭해보세요! 🏘️</div></div>
        <div class="hud-badge">🤍 <span class="px hud-badge-text" id="hudChalk">12꼬집</span></div>
      </div>
      <!-- 바닥, 건물, 아이템 JS 주입 -->
    </div>

    <!-- 암장 패널 -->
    <div class="gym-panel" id="gymPanel">
      <div class="panel-handle" onclick="closePanel()"></div>
      <div class="panel-scroll">
        <div class="panel-header">
          <div><div class="panel-name" id="pName"></div><div class="px panel-area" id="pArea"></div></div>
          <button class="panel-close" onclick="closePanel()">×</button>
        </div>
        <div class="panel-lv-row">
          <div class="px panel-lv-badge" id="pLv">Lv.1</div>
          <div class="panel-lv-desc" id="pLvDesc"></div>
        </div>
        <div class="chalk-card">
          <div class="px chalk-ttl">🤍 공동 쵸크</div>
          <div class="chalk-amt-row"><span class="chalk-amt" id="pAmt">0</span><span class="px chalk-unit">꼬집</span></div>
          <div class="chalk-bar-bg"><div class="chalk-bar" id="pBar" style="width:0%"></div></div>
          <div class="px chalk-note" id="pNote"></div>
        </div>
        <div class="px sec-lbl">🐱 암장 나비들</div>
        <div class="members-row" id="pMembers"></div>
        <button class="px btn-enter-gym" onclick="enterGym()">🏔️ 암장 안으로 들어가기</button>
        <div class="menu-grid">
          <div class="menu-card" onclick="toast2('📖 방명록은 준비 중!')"><div class="m-icon">📖</div><div class="px m-title">방명록</div><div class="px m-sub">오늘의 한마디</div><div class="px soon-tag">준비 중</div></div>
          <div class="menu-card" onclick="toast2('💬 채팅은 준비 중!')"><div class="m-icon">💬</div><div class="px m-title">채팅</div><div class="px m-sub">멤버들과 대화</div><div class="px soon-tag">준비 중</div></div>
          <div class="menu-card" onclick="donate()"><div class="m-icon">🤍</div><div class="px m-title">쵸크 기부</div><div class="px m-sub">공동 쵸크에 기부</div></div>
          <div class="menu-card" onclick="goRecord()"><div class="m-icon">🧗</div><div class="px m-title">기록 시작</div><div class="px m-sub">이 암장에서 기록</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 암장 내부 화면 -->
  <div class="gym-interior" id="gymInterior">
    <div class="interior-header">
      <button class="interior-back" onclick="exitGym()">
        <svg width="24" height="24" viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="2" fill="#222"/><rect x="5" y="11" width="2" height="2" fill="#222"/><rect x="7" y="9" width="2" height="2" fill="#222"/><rect x="7" y="13" width="2" height="2" fill="#222"/><rect x="9" y="7" width="2" height="2" fill="#222"/><rect x="9" y="15" width="2" height="2" fill="#222"/></svg>
      </button>
      <div class="px interior-title" id="interiorTitle">더클라임 강남</div>
      <div class="px interior-lv" id="interiorLv">Lv.3</div>
    </div>
    <div class="interior-scroll" id="interiorScroll">
      <!-- 층별 내용 JS로 주입 -->
    </div>
  </div>

  <!-- 메뉴바 -->
  <div class="bottomnav">

// ── 바닥 SVG ──
function makeFloor(){
  const W=360,H=600;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',W);svg.setAttribute('height',H);
  svg.style.cssText='position:absolute;top:0;left:0;z-index:1;image-rendering:pixelated';

  const TW=28,TH=14;
  let inner='';

  // 전체 흰색 바닥
  inner+=`<rect width="${W}" height="${H}" fill="#ffffff"/>`;

  // 타일 패턴
  const zones=[
    {x1:0,y1:60,x2:140,y2:300},
    {x1:176,y1:60,x2:328,y2:300},
    {x1:0,y1:336,x2:360,y2:600},
  ];
  for(const z of zones){
    for(let r=0;r*TH<z.y2-z.y1;r++){
      for(let c=0;c*TW<z.x2-z.x1;c++){
        const tx=z.x1+c*TW,ty=z.y1+r*TH;
        const tw=Math.min(TW,z.x2-tx),th=Math.min(TH,z.y2-ty);
        if(tw<=0||th<=0) continue;
        const shade=(r+c)%2===0?'#ffffff':'#f4f2ec';
        inner+=`<rect x="${tx}" y="${ty}" width="${tw}" height="${th}" fill="${shade}" stroke="#e4e0d8" stroke-width="0.8"/>`;
      }
    }
  }

  // 세로 도로 (좌중간)
  inner+=`<rect x="140" y="60" width="36" height="240" fill="#e8e6e2" stroke="#d0cdc8" stroke-width="1"/>`;
  for(let i=0;i<7;i++) inner+=`<line x1="158" y1="${80+i*28}" x2="158" y2="${94+i*28}" stroke="#fff" stroke-width="2"/>`;

  // 세로 도로 (우측)
  inner+=`<rect x="328" y="60" width="32" height="240" fill="#e8e6e2" stroke="#d0cdc8" stroke-width="1"/>`;
  for(let i=0;i<7;i++) inner+=`<line x1="344" y1="${80+i*28}" x2="344" y2="${94+i*28}" stroke="#fff" stroke-width="2"/>`;

  // 가로 도로
  inner+=`<rect x="0" y="300" width="360" height="36" fill="#e8e6e2" stroke="#d0cdc8" stroke-width="1"/>`;
  for(let i=0;i<11;i++) inner+=`<line x1="${12+i*32}" y1="318" x2="${28+i*32}" y2="318" stroke="#fff" stroke-width="2"/>`;

  // 교차로
  inner+=`<rect x="140" y="300" width="36" height="36" fill="#e0ddd8"/>`;
  inner+=`<rect x="328" y="300" width="32" height="36" fill="#e0ddd8"/>`;

  // 도로 경계 강조선
  inner+=`<line x1="140" y1="60" x2="140" y2="336" stroke="#c8c5c0" stroke-width="1.5"/>`;
  inner+=`<line x1="176" y1="60" x2="176" y2="336" stroke="#c8c5c0" stroke-width="1.5"/>`;
  inner+=`<line x1="328" y1="60" x2="328" y2="336" stroke="#c8c5c0" stroke-width="1.5"/>`;
  inner+=`<line x1="0" y1="300" x2="360" y2="300" stroke="#c8c5c0" stroke-width="1.5"/>`;
  inner+=`<line x1="0" y1="336" x2="360" y2="336" stroke="#c8c5c0" stroke-width="1.5"/>`;

  svg.innerHTML=inner;
  return svg;
}

// ── 마을 초기화 ──
function init(){
  const world=document.getElementById('world');
  const nabiIdx=Math.min(USER.nabiStage-1,4);

    const bs=B_SIZE[gym.level]||B_SIZE[3];

// ── 마을 패널 ──
function openGym(idx){
  selIdx=idx;
  const g=USER.gyms[idx];
  document.getElementById('pName').textContent=g.name;
  document.getElementById('pArea').textContent=g.area;
  document.getElementById('pLv').textContent=`Lv.${g.level}`;
  document.getElementById('pLvDesc').textContent=LV_DESC[g.level]||'실내 암장';
  document.getElementById('pAmt').textContent=g.chalkPool;
  document.getElementById('pBar').style.width=Math.min(g.chalkPool/g.chalkGoal*100,100)+'%';
  document.getElementById('pNote').textContent=`다음 업그레이드까지 ${g.chalkGoal-g.chalkPool}꼬집`;
  const EM=['🐈‍⬛','🐈','😺','😸','🌟'];
  document.getElementById('pMembers').innerHTML=g.members.map(m=>`<div class="member-chip ${m.isMe?'me':''}"><div class="m-emoji">${EM[Math.min(m.stage-1,4)]}</div><div class="px m-name">${m.isMe?'나':m.name}</div><div class="px m-streak">🔥${m.streak}일</div></div>`).join('');
  document.getElementById('gymPanel').classList.add('show');
}
function closePanel(){document.getElementById('gymPanel').classList.remove('show');selIdx=null;}

// ── 암장 내부 진입 ──
function enterGym(){
  if(selIdx===null) return;
  const g=USER.gyms[selIdx];
  closePanel();

  document.getElementById('interiorTitle').textContent=g.name;
  document.getElementById('interiorLv').textContent=`Lv.${g.level}`;

  const scroll=document.getElementById('interiorScroll');
  scroll.innerHTML='';
  scroll.scrollTop=0;

  // 최상층부터 렌더링 (위에서 아래로 = 높은 층 → 낮은 층)
  g.floors.forEach((floor,fi)=>{
    // 층간 계단 (첫 층 제외)
    if(fi>0){
      const stair=document.createElement('div');
      stair.className='stair-divider';
      stair.innerHTML=`<span class="stair-icon">🪜</span><span class="px stair-label">계단</span>`;
      scroll.appendChild(stair);
    }

    const floorDiv=document.createElement('div');
    floorDiv.className='floor-wrap';

    // 층 라벨
    const floorLabel=document.createElement('div');
    floorLabel.className='px floor-label';
    floorLabel.innerHTML=`<span>${floor.label}</span>`;
    floorDiv.appendChild(floorLabel);

    // 클라이밍 벽
    const wallSec=document.createElement('div');
    wallSec.className='wall-section';
    const wallImg=document.createElement('img');
    wallImg.className='wall-img';
    wallImg.src=WALLS[floor.wallType]||WALLS.flat;
    wallImg.alt=`${floor.label} 클라이밍 벽`;
    wallSec.appendChild(wallImg);
    floorDiv.appendChild(wallSec);

    // 공동 쵸크 바 (1층에만)
    if(fi===g.floors.length-1){
      const chalkBar=document.createElement('div');
      chalkBar.className='chalk-pool-bar';
      const pct=Math.min(g.chalkPool/g.chalkGoal*100,100);
      chalkBar.innerHTML=`
        <div class="chalk-pool-icon">🤍</div>
        <div class="chalk-pool-info">
          <div class="px chalk-pool-label">공동 쵸크 ${g.chalkPool}꼬집</div>
          <div class="chalk-pool-track"><div class="chalk-pool-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="px chalk-pool-count">/${g.chalkGoal}</div>`;
      floorDiv.appendChild(chalkBar);
    }

    // 게시판
    const board=document.createElement('div');
    board.className='board-section';
    board.innerHTML=`<div class="px board-title">📋 게시판</div><div class="board-notes">${
      floor.notes.map((n,ni)=>`<div class="note" style="background:${NOTE_COLORS[ni%NOTE_COLORS.length]}">${n}</div>`).join('')
    }</div>`;
    floorDiv.appendChild(board);

    // 아이템함
    const itemBox=document.createElement('div');
    itemBox.className='item-box-section';
    const slots=['장비함','클립','도구'];
    itemBox.innerHTML=`<div class="px item-box-title">📦 아이템함</div>
      <div class="item-box-grid">${
        floor.items.map((item,ii)=>`
          <div class="item-slot ${item?'':'empty'}" onclick="toast2('${item||'비어있어요'}')">
            <div>${item||'　'}</div>
            <div class="px item-slot-label">${slots[ii]||'슬롯'}</div>
          </div>`).join('')
      }</div>`;
    floorDiv.appendChild(itemBox);

    scroll.appendChild(floorDiv);
  });

  document.getElementById('gymInterior').classList.add('show');
}

function exitGym(){
  document.getElementById('gymInterior').classList.remove('show');
}

// ── 기타 ──
function donate(){
  if(USER.chalkCount<=0){toast2('쵸크가 없어요!');return;}
  const g=USER.gyms[selIdx];
  USER.chalkCount--;g.chalkPool++;
  document.getElementById('hudChalk').textContent=USER.chalkCount+'꼬집';
  document.getElementById('pAmt').textContent=g.chalkPool;
  document.getElementById('pBar').style.width=Math.min(g.chalkPool/g.chalkGoal*100,100)+'%';
  document.getElementById('pNote').textContent=`다음 업그레이드까지 ${g.chalkGoal-g.chalkPool}꼬집`;
  toast2('🤍 공동 쵸크에 1꼬집 기부했어요!');
}
function goRecord(){
  const g=USER.gyms[selIdx];
  sessionStorage.setItem('selectedGym',JSON.stringify({id:g.id,name:g.name,area:g.area}));
  location.href='record.html';
}
function toast2(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

init();
</script>
</body>
</html>
