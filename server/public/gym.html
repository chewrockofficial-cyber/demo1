<!DOCTYPE html>

<style>
@font-face {
  font-family: 'Galmuri11';
  src: url('https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/Galmuri11.woff2') format('woff2');
  font-weight: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Galmuri11';
  src: url('https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/Galmuri11-Bold.woff2') format('woff2');
  font-weight: 700;
  font-display: swap;
}

/* ══════════════════════════════════
   Chew Rock Design System Override
   Galmuri11 + 픽셀 UI 통일
══════════════════════════════════ */
*, *::before, *::after {
  font-family: 'Galmuri11', 'Press Start 2P', monospace !important;
}
.px { font-family: 'Galmuri11', monospace !important; font-weight: 700 !important; }
button { border-radius: 0 !important; font-family: 'Galmuri11', monospace !important; font-weight: 700 !important; }
input, textarea { border-radius: 0 !important; font-family: 'Galmuri11', monospace !important; border: 2px solid #111 !important; }
input:focus, textarea:focus { outline: none !important; box-shadow: inset 2px 2px 0 #E0E0E0 !important; }
/* 각진 border-radius 제거 */
[class*="card"],[class*="panel"],[class*="modal"],[class*="chip"],
[class*="badge"],[class*="bubble"],[class*="tag"],[class*="bar"],
.member-chip,.sub-modal,.gym-panel,.notice-board,.item-box {
  border-radius: 0 !important;
}
/* 메뉴바 굵은 선 */
.bottomnav { border-top: 3px solid #111 !important; }
/* 토스트 픽셀 */
.toast { border-radius: 0 !important; border: 3px solid #333 !important; font-weight: 700 !important; box-shadow: 4px 4px 0 #555 !important; }
/* 진행바 각진 */
.chalk-bar-bg,[class*="-bar-bg"],[class*="-track"] { border-radius: 0 !important; border: 2px solid #111 !important; }
.chalk-bar,[class*="-bar"],[class*="-fill"] { border-radius: 0 !important; }
/* 버튼 픽셀 그림자 */
.btn-record,.btn-enter-gym,.btn-find,.btn-join-gym,[class*="btn-record"],[class*="btn-enter"] {
  border-radius: 0 !important;
  box-shadow: 4px 4px 0 #555 !important;
  font-weight: 700 !important;
}
/* 기록 탭 버튼들 */
button[onclick], .tab-btn { border-radius: 0 !important; }
/* 픽셀 이미지 렌더링 */
img { image-rendering: pixelated; }
/* 모달 각진 */
.gym-panel { border-radius: 0 !important; border-top-width: 3px !important; }
.sub-modal { border-radius: 0 !important; }
/* 인풋 각진 */
input[type=text], input[type=number], textarea, select {
  border-radius: 0 !important; border: 2px solid #111 !important;
  font-family: 'Galmuri11', monospace !important;
}
/* 난이도/조건 칩들 */
[class*="-chip"], [class*="-pill"], [class*="-tag"] { border-radius: 0 !important; }
/* 멤버 칩 각진 */
.member-chip { border-radius: 0 !important; }
/* 상점 카드 */
[class*="item-card"], [class*="product"] { border-radius: 0 !important; }

</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nabi — 마을</title>
<style>
.px{font-family:'Press Start 2P',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#f0f0f0;display:flex;justify-content:center;min-height:100vh}
.phone{width:360px;height:740px;border:2px solid #ddd;border-radius:32px;margin:1rem auto;overflow:hidden;position:relative;background:#fff;display:flex;flex-direction:column}

/* 월드 스크롤 */
.world-wrap{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;position:relative}
.world-wrap::-webkit-scrollbar{display:none}
.world{width:360px;position:relative;background:#fff}

/* HUD - 얇고 비간섭 */
.hud{position:sticky;top:0;z-index:50;padding:20px 16px 6px;display:flex;justify-content:space-between;align-items:flex-start;background:linear-gradient(rgba(255,255,255,0.92) 75%,transparent);pointer-events:none}
.hud *{pointer-events:auto}
.hud-title{font-size:10px;color:#111;letter-spacing:1px}
.hud-sub{font-size:6px;color:#888;margin-top:3px}
.hud-chalk{display:flex;align-items:center;gap:3px;background:rgba(255,255,255,0.9);border:1.5px solid #222;padding:4px 8px}
.hud-chalk-text{font-size:7px;color:#111}

/* 맵 래퍼 */
.map-wrap{position:relative;width:360px}
.map-wrap svg{display:block}

/* 나비 */
.nabi-on-map{position:absolute;image-rendering:pixelated;filter:drop-shadow(1px 2px 0 rgba(0,0,0,0.2));z-index:8}

/* 핫스팟 */
.gym-hotspot{position:absolute;cursor:pointer;z-index:10;border-radius:2px;transition:box-shadow 0.15s}
.gym-hotspot:hover{box-shadow:0 0 0 2px rgba(255,180,0,0.8)}

/* 암장 패널 */
.gym-panel{position:absolute;bottom:0;left:0;right:0;z-index:80;background:#fff;border-radius:20px 20px 0 0;border-top:3px solid #222;transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.34,1.1,0.64,1);height:86%;display:flex;flex-direction:column}
.gym-panel.show{transform:translateY(0)}
.panel-handle{width:40px;height:4px;background:#ddd;border:1px solid #ccc;border-radius:2px;margin:12px auto 0;flex-shrink:0;cursor:pointer}
.panel-header{display:flex;align-items:center;padding:10px 16px;border-bottom:2px solid #eee;flex-shrink:0;gap:8px}
.panel-name{font-size:11px;color:#111}
.panel-area{font-size:7px;color:#888;margin-top:2px}
.panel-lv{background:#ffd180;border:2px solid #222;padding:2px 8px;font-size:8px;color:#111;box-shadow:1px 1px 0 #222;margin-left:auto;flex-shrink:0}
.panel-close{background:none;border:none;cursor:pointer;font-size:22px;color:#999;line-height:1;margin-left:6px}
.panel-scroll{flex:1;overflow-y:auto;scrollbar-width:none}
.panel-scroll::-webkit-scrollbar{display:none}

/* 쵸크 헤더 */
.chalk-header{padding:10px 16px;background:#fff8f0;border-bottom:2px solid #ffd180;display:flex;align-items:center;gap:10px;flex-shrink:0}

/* 층 섹션 */
.floor-section{border-bottom:3px solid #222;background:#f5f3f0}
.floor-bg{background:linear-gradient(180deg,#efece8 0%,#e6e3de 100%);padding:14px 0 0;position:relative}
.floor-label{position:absolute;top:10px;left:14px;background:#222;color:#fff;font-size:7px;padding:3px 8px}
.wall-area{display:flex}
.wall-img-wrap{width:62%;position:relative;cursor:pointer;border-right:2px solid #222}
.wall-img-wrap:hover::after{content:'👆 루트 보기';position:absolute;bottom:6px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:#fff;font-size:6px;padding:3px 7px;white-space:nowrap;font-family:'Press Start 2P',monospace}
.wall-img{width:100%;image-rendering:pixelated;display:block}
.wall-side{width:38%;display:flex;flex-direction:column;padding:30px 10px 10px;gap:8px}
.notice-board{background:#f0edd8;border:2px solid #888;border-radius:2px;padding:7px;cursor:pointer}
.notice-board:hover{border-color:#222}
.notice-board-title{font-size:6px;color:#666;margin-bottom:5px}
.notice-stickers{display:flex;flex-wrap:wrap;gap:3px}
.sticker{width:18px;height:18px;border-radius:1px;box-shadow:1px 1px 0 rgba(0,0,0,0.12)}
.group-tee{background:#e4f0ff;border:1.5px solid #90caf9;border-radius:18px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:14px;margin-left:auto;cursor:pointer}
.ladder-area{display:flex;align-items:center;justify-content:center;padding:2px 0}
.floor-bottom{background:#dedad4;border-top:2px solid #222;padding:7px 14px 10px;display:flex;gap:8px}
.mat{flex:1;background:#a8a8a8;border:2px solid #222;border-radius:2px;height:12px;box-shadow:0 3px 0 #888}
.floor-items{padding:10px 14px;background:#e8e5df;border-top:1.5px solid #d4d0ca;display:flex;gap:10px;align-items:flex-start}
.chalk-bucket{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.chalk-bucket:hover{transform:scale(1.05)}
.chalk-bucket-icon{font-size:24px}
.chalk-bucket-label{font-size:6px;color:#666;text-align:center;line-height:1.4}
.chalk-bucket-count{font-size:8px;color:#111;font-family:'Press Start 2P',monospace}
.item-box{flex:1;background:#dddad4;border:2px solid #222;border-radius:4px;padding:7px;cursor:pointer}
.item-box:hover{border-color:#e65100}
.item-box-header{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.item-box-title{font-size:7px;color:#555}
.item-box-slots{display:flex;gap:4px}
.item-slot2{width:32px;height:32px;background:#fff;border:1.5px solid #ccc;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:15px}
.stair-sep{display:flex;align-items:center;background:#d8d5cf;border-top:2px solid #aaa;border-bottom:2px solid #aaa;padding:5px 14px;gap:8px}
.stair-sep-label{font-size:7px;color:#888}

/* 서브 모달 */
.sub-modal-backdrop{display:none;position:absolute;inset:0;z-index:200;background:rgba(0,0,0,0.45);align-items:flex-end;justify-content:center}
.sub-modal-backdrop.show{display:flex}
.sub-modal{background:#fff;border-radius:20px 20px 0 0;border-top:3px solid #222;width:100%;max-height:62%;display:flex;flex-direction:column}
.sub-modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 0;flex-shrink:0}
.sub-modal-header{padding:10px 18px;border-bottom:1px solid #eee;flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.sub-modal-title{font-size:10px;color:#111}
.sub-modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:#bbb}
.sub-modal-body{overflow-y:auto;padding:12px 18px 24px;flex:1}
.route-list,.note-list,.chalk-log,.item-list{display:flex;flex-direction:column;gap:7px}
.route-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1.5px solid #eee;border-radius:7px;background:#fafafa}
.route-color{width:14px;height:14px;border-radius:50%;border:2px solid #222;flex-shrink:0}
.route-name{font-size:10px;color:#111}
.route-grade{font-size:8px;color:#888;margin-top:2px}
.route-status{margin-left:auto;font-size:8px;padding:3px 8px;border-radius:5px}
.route-status.done{background:#e8f5e9;color:#2e7d32}
.route-status.try{background:#fff8e1;color:#f57f17}
.note-item{background:#fafafa;border:1.5px solid #eee;border-radius:7px;padding:10px 12px}
.note-text{font-size:10px;color:#333;line-height:1.7}
.note-meta{font-size:8px;color:#bbb;margin-top:3px}
.chalk-log-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#fff8f0;border:1.5px solid #ffd180;border-radius:7px}
.chalk-log-emoji{font-size:18px}
.chalk-log-name{font-size:10px;color:#111}
.chalk-log-detail{font-size:8px;color:#888;margin-top:2px}
.chalk-log-amt{margin-left:auto;font-size:9px;color:#e65100;font-family:'Press Start 2P',monospace}
.item-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#fafafa;border:1.5px solid #eee;border-radius:7px}
.item-icon-big{font-size:22px}
.item-name{font-size:10px;color:#111}
.item-donor{font-size:8px;color:#888;margin-top:2px}
.item-qty{margin-left:auto;font-size:8px;color:#555;font-family:'Press Start 2P',monospace}

/* 메뉴바 */
.bottomnav{flex-shrink:0;background:#fff;border-top:2px solid #eee;display:flex;padding:12px 0 18px;position:relative;z-index:200}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;padding:4px 0;color:#bbb}
.nav-label{font-family:'Press Start 2P',monospace;font-size:8px}
.nav-item.active{color:#111}
.nav-item.active .nav-label{color:#111}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 18px;border:2px solid #222;font-size:8px;z-index:999;white-space:nowrap;display:none}
.toast.show{display:block}
</style>

let selIdx=null;

function init(){
  document.getElementById('hudChalk').textContent=USER.chalkCount+'꼬집';
  const mapWrap=document.getElementById('mapWrap');
  const nabiIdx=Math.min(USER.nabiStage-1,4);

  // 나비 (광장 중앙 하단 - 컨셉처럼 작게)
  const nabi=document.createElement('img');
  nabi.src=NABI[nabiIdx];
  nabi.width=52; nabi.height=62;
  nabi.className='nabi-on-map';
  nabi.style.cssText='left:148px;top:356px;';
  mapWrap.appendChild(nabi);

  // 핫스팟
  USER.gyms.forEach((gym,i)=>{
    const hs=document.createElement('div');
    hs.className='gym-hotspot';
    hs.style.cssText=`left:${gym.hotspot.l}px;top:${gym.hotspot.t}px;width:${gym.hotspot.w}px;height:${gym.hotspot.h}px;`;
    hs.onclick=()=>openGym(i);
    mapWrap.appendChild(hs);
  });
}

function openGym(idx){
  selIdx=idx;
  const g=USER.gyms[idx];
  document.getElementById('pName').textContent=g.name;
  document.getElementById('pArea').textContent=g.area;
  document.getElementById('pLv').textContent=`Lv.${g.level}`;

  const scroll=document.getElementById('panelScroll');
  scroll.innerHTML=''; scroll.scrollTop=0;

  // 쵸크 헤더
  const ch=document.createElement('div');
  ch.className='chalk-header';
  const pct=Math.min(g.chalkPool/g.chalkGoal*100,100);
  ch.innerHTML=`<div style="flex:1"><div class="px" style="font-size:7px;color:#e65100;margin-bottom:4px">🤍 공동 쵸크 ${g.chalkPool}꼬집</div><div style="background:#f0f0f0;height:7px;border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:linear-gradient(90deg,#ffd180,#ffb300)"></div></div></div><div class="px" style="font-size:7px;color:#bbb">/${g.chalkGoal}</div>`;
  scroll.appendChild(ch);

  g.floors.forEach((floor,fi)=>{
    if(fi>0){
      const sep=document.createElement('div');
      sep.className='stair-sep';
      sep.innerHTML=`<div style="flex:1;height:1px;background:#ccc"></div><span style="font-size:14px">🪜</span><span class="px stair-sep-label">계단</span><div style="flex:1;height:1px;background:#ccc"></div>`;
      scroll.appendChild(sep);
    }

    const sec=document.createElement('div'); sec.className='floor-section';
    const bg=document.createElement('div'); bg.className='floor-bg';
    const lbl=document.createElement('div'); lbl.className='px floor-label'; lbl.textContent=floor.label;
    bg.appendChild(lbl);

    const wa=document.createElement('div'); wa.className='wall-area';
    const ww=document.createElement('div'); ww.className='wall-img-wrap';
    const wi=document.createElement('img'); wi.className='wall-img';
    wi.src=WALLS[floor.wallType]||WALLS.flat; wi.alt='클라이밍 벽';
    ww.appendChild(wi); ww.onclick=()=>openRoutes(floor);
    const side=document.createElement('div'); side.className='wall-side';

    // 게시판
    const board=document.createElement('div'); board.className='notice-board';
    board.innerHTML=`<div class="px notice-board-title">📋 게시판</div><div class="notice-stickers">${floor.notes.map((_,ni)=>`<div class="sticker" style="background:${NOTE_COLORS[ni%NOTE_COLORS.length]}"></div>`).join('')}</div>`;
    board.onclick=()=>openBoard(floor); side.appendChild(board);

    if(fi===0){ const tee=document.createElement('div'); tee.className='group-tee'; tee.textContent='👕'; tee.onclick=()=>toast2('단체티 기능 준비 중!'); side.appendChild(tee); }
    if(fi<g.floors.length-1){
      const lad=document.createElement('div'); lad.className='ladder-area';
      lad.innerHTML=`<svg width="30" height="50" viewBox="0 0 30 50" style="image-rendering:pixelated"><rect x="1" y="0" width="4" height="50" fill="#aaa" stroke="#888" stroke-width="1"/><rect x="25" y="0" width="4" height="50" fill="#aaa" stroke="#888" stroke-width="1"/>${[0,1,2,3,4].map(i=>`<rect x="1" y="${3+i*9}" width="28" height="3" fill="#bbb" stroke="#999" stroke-width="0.5"/>`).join('')}</svg>`;
      side.appendChild(lad);
    }

    wa.appendChild(ww); wa.appendChild(side); bg.appendChild(wa);
    const fb=document.createElement('div'); fb.className='floor-bottom';
    fb.innerHTML='<div class="mat"></div><div class="mat" style="width:36%;margin-left:8px"></div>';
    bg.appendChild(fb); sec.appendChild(bg);

    if(fi===g.floors.length-1){
      const fi2=document.createElement('div'); fi2.className='floor-items';
      const bk=document.createElement('div'); bk.className='chalk-bucket';
      bk.innerHTML=`<div class="chalk-bucket-icon">🪣</div><div class="chalk-bucket-count">${g.chalkPool}</div><div class="px chalk-bucket-label">공동<br>쵸크</div>`;
      bk.onclick=()=>openChalkLog(floor.chalkLog||[]); fi2.appendChild(bk);
      const ib=document.createElement('div'); ib.className='item-box';
      ib.innerHTML=`<div class="item-box-header"><span style="font-size:13px">📦</span><div class="px item-box-title">아이템함</div></div><div class="item-box-slots">${floor.items.slice(0,3).map(it=>`<div class="item-slot2">${it.icon}</div>`).join('')}</div>`;
      ib.onclick=()=>openItems(floor.items); fi2.appendChild(ib);
      sec.appendChild(fi2);
    }
    scroll.appendChild(sec);
  });

  document.getElementById('gymPanel').classList.add('show');
}

function closePanel(){ document.getElementById('gymPanel').classList.remove('show'); selIdx=null; }
function openSubModal(title,html){ document.getElementById('subTitle').textContent=title; document.getElementById('subBody').innerHTML=html; document.getElementById('subBackdrop').classList.add('show'); }
function closeSubModal(e){ if(e&&e.target!==document.getElementById('subBackdrop'))return; document.getElementById('subBackdrop').classList.remove('show'); }

function openRoutes(floor){
  const wallNames={flat:'평평한 벽',slant:'기울어진 벽',boulder:'울퉁불퉁한 벽'};
  openSubModal(`🧗 ${floor.label} 루트`,`<div class="route-list">${floor.routes.map(r=>`<div class="route-item"><div class="route-color" style="background:${r.color}"></div><div><div class="route-name">${r.name}</div><div class="px route-grade">${r.grade}</div></div><div class="px route-status ${r.done?'done':'try'}">${r.done?'완등 ✓':'도전 중'}</div></div>`).join('')}</div>`);
}
function openBoard(floor){
  openSubModal(`📋 ${floor.label} 게시판`,`<div class="note-list">${floor.notes.map((n,ni)=>`<div class="note-item" style="background:${NOTE_COLORS[ni%NOTE_COLORS.length]}"><div class="note-text">${n.text}</div><div class="px note-meta">${n.author} · ${n.time}</div></div>`).join('')}</div>`);
}
function openChalkLog(logs){
  if(!logs.length){toast2('아직 쵸크 기록이 없어요');return;}
  openSubModal('🤍 쵸크 기부 내역',`<div class="chalk-log">${logs.map(l=>`<div class="chalk-log-item"><div class="chalk-log-emoji">${l.emoji}</div><div><div class="chalk-log-name">${l.name}</div><div class="px chalk-log-detail">${l.time} 기부</div></div><div class="chalk-log-amt">+${l.amt}꼬집</div></div>`).join('')}</div>`);
}
function openItems(items){
  openSubModal('📦 아이템함',`<div class="item-list">${items.map(it=>`<div class="item-item"><div class="item-icon-big">${it.icon}</div><div><div class="item-name">${it.name}</div><div class="px item-donor">${it.donor} · ${it.time} 기부</div></div><div class="px item-qty">x${it.qty}</div></div>`).join('')}</div>`);
}
function toast2(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

init();
</script>
</body>
</html>
