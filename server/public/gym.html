<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nabi — 마을</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
.px{font-family:'Press Start 2P',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#f0f0f0;display:flex;justify-content:center;min-height:100vh}

.phone{
  width:360px;height:740px;
  border:2px solid #ddd;border-radius:32px;
  margin:1rem auto;overflow:hidden;
  position:relative;background:#f5f3ee;
  display:flex;flex-direction:column;
}

/* ── 스크롤 월드 ── */
.world-wrap{
  flex:1;overflow-y:auto;overflow-x:hidden;
  position:relative;scrollbar-width:none;
}
.world-wrap::-webkit-scrollbar{display:none}

/* 월드 = 컨셉 이미지 비율 그대로 (360x537) + 여백 */
.world{
  width:360px;
  height:620px;
  position:relative;
  background:#f0ede5;
  overflow:hidden;
}

/* ── 아이소메트릭 바닥 타일 ── */
.iso-floor{
  position:absolute;bottom:0;left:0;right:0;height:280px;
  z-index:1;
}

/* ── HUD ── */
.hud{
  position:sticky;top:0;z-index:50;
  padding:26px 18px 8px;
  display:flex;justify-content:space-between;align-items:flex-start;
  background:linear-gradient(rgba(245,243,238,0.95) 70%,rgba(245,243,238,0));
  pointer-events:none;
}
.hud *{pointer-events:auto}
.hud-title{font-size:11px;color:#111;letter-spacing:1px}
.hud-sub{font-size:7px;color:#666;margin-top:4px}
.hud-badge{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.95);border:2px solid #222;padding:5px 9px}
.hud-badge-text{font-size:8px;color:#111}

/* ── 나비 캐릭터 ── */
.nabi-wrap{
  position:absolute;z-index:20;
  left:158px;top:278px;
  display:flex;flex-direction:column;align-items:center;
}
.nabi-img{width:64px;height:auto;image-rendering:pixelated;filter:drop-shadow(1px 3px 0 rgba(0,0,0,0.2))}
.nabi-shadow{width:48px;height:5px;background:rgba(0,0,0,0.1);border-radius:50%;margin-top:-1px;filter:blur(2px)}

/* ── 이벤트 아이템 ── */
.evt{
  position:absolute;z-index:15;font-size:22px;
  animation:efloat 3s ease-in-out infinite;
  cursor:default;
  filter:drop-shadow(1px 2px 0 rgba(0,0,0,0.15));
}
@keyframes efloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

/* ── 건물 클릭 핫스팟 ── */
.gym-hot{
  position:absolute;z-index:25;cursor:pointer;
}
.gym-hot:hover .hot-hl{opacity:1}
.hot-hl{
  position:absolute;inset:0;
  border:3px solid rgba(255,200,0,0.85);
  background:rgba(255,200,0,0.08);
  opacity:0;transition:opacity 0.15s;
  pointer-events:none;
}
/* 이름 툴팁 */
.hot-tip{
  position:absolute;bottom:calc(100%+4px);left:50%;transform:translateX(-50%);
  background:#fff;border:2px solid #222;
  padding:3px 8px;font-size:7px;color:#111;
  white-space:nowrap;box-shadow:2px 2px 0 #222;
  opacity:0;transition:opacity 0.15s;pointer-events:none;z-index:30;
}
.gym-hot:hover .hot-tip{opacity:1}

/* ── 암장 SVG 건물들 ── */
/* (JS로 직접 삽입) */

/* ── 칠판 스탠드 간판 ── */
.chalkboard{
  position:absolute;z-index:18;
  display:flex;flex-direction:column;align-items:center;
  pointer-events:none;
}

/* ── 패널 ── */
.gym-panel{
  position:absolute;bottom:0;left:0;right:0;z-index:100;
  background:#fff;border-radius:20px 20px 0 0;
  border-top:3px solid #222;
  transform:translateY(100%);
  transition:transform 0.32s cubic-bezier(0.34,1.2,0.64,1);
  max-height:490px;display:flex;flex-direction:column;
}
.gym-panel.show{transform:translateY(0)}
.panel-handle{width:40px;height:4px;background:#ddd;border:1px solid #ccc;border-radius:2px;margin:12px auto 0;flex-shrink:0;cursor:pointer}
.panel-scroll{overflow-y:auto;flex:1;padding:14px 18px 8px}
.panel-scroll::-webkit-scrollbar{width:4px}
.panel-scroll::-webkit-scrollbar-thumb{background:#ddd}
.panel-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.panel-name{font-size:12px;color:#111}
.panel-area{font-size:8px;color:#888;margin-top:3px}
.panel-close{background:none;border:none;cursor:pointer;font-size:20px;color:#999;line-height:1}
.panel-lv-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.panel-lv-badge{background:#ffd180;border:2px solid #222;padding:3px 10px;font-size:9px;color:#111;box-shadow:2px 2px 0 #222}
.panel-lv-desc{font-size:8px;color:#888}
.chalk-card{background:#fff8f0;border:2px solid #ffd180;border-radius:6px;padding:11px;margin-bottom:9px}
.chalk-ttl{font-size:8px;color:#e65100;margin-bottom:5px}
.chalk-amt-row{display:flex;align-items:baseline;gap:6px;margin-bottom:5px}
.chalk-amt{font-size:20px;color:#111}
.chalk-unit{font-size:8px;color:#888}
.chalk-bar-bg{background:#f0f0f0;border:1.5px solid #ddd;height:8px;margin-bottom:3px;overflow:hidden}
.chalk-bar{height:100%;background:repeating-linear-gradient(90deg,#ffd180 0,#ffb300 4px,#ffd180 8px);transition:width 0.5s}
.chalk-note{font-size:7px;color:#bbb}
.sec-lbl{font-size:8px;color:#888;margin-bottom:6px}
.members-row{display:flex;gap:6px;margin-bottom:9px;overflow-x:auto;padding-bottom:2px}
.members-row::-webkit-scrollbar{display:none}
.member-chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;background:#fafafa;border:2px solid #eee;padding:7px 8px}
.member-chip.me{border-color:#222}
.m-emoji{font-size:20px}
.m-name{font-size:7px;color:#555}
.m-streak{font-size:6px;color:#e65100}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:9px}
.menu-card{background:#fafafa;border:2px solid #eee;padding:11px;cursor:pointer;text-align:center}
.menu-card:active{background:#f0f0f0}
.m-icon{font-size:20px;margin-bottom:3px}
.m-title{font-size:8px;color:#111;margin-bottom:2px}
.m-sub{font-size:7px;color:#bbb;line-height:1.4}
.soon-tag{display:inline-block;font-size:6px;color:#bbb;background:#f0f0f0;border:1px solid #ddd;padding:2px 5px;margin-top:2px}
.btn-record{width:100%;padding:12px;background:#111;color:#fff;border:2px solid #222;font-size:8px;cursor:pointer;letter-spacing:0.5px;margin-bottom:4px}

/* ── 메뉴바 (항상 하단 고정) ── */
.bottomnav{
  flex-shrink:0;z-index:200;
  background:#fff;border-top:2px solid #eee;
  display:flex;padding:12px 0 18px;
}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;padding:4px 0;color:#bbb}
.nav-label{font-family:'Press Start 2P',monospace;font-size:8px}
.nav-item.active{color:#111}
.nav-item.active .nav-label{color:#111}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 18px;border:2px solid #222;font-size:8px;z-index:999;white-space:nowrap;display:none}
.toast.show{display:block}
</style>
</head>
<body>
<div class="phone">
  <div class="world-wrap" id="worldWrap">
    <div class="world" id="world">

      <!-- HUD -->
      <div class="hud">
        <div>
          <div class="px hud-title">마을</div>
          <div class="hud-sub">암장을 탭해보세요! 🏘️</div>
        </div>
        <div class="hud-badge">🤍 <span class="px hud-badge-text" id="hudChalk">12꼬집</span>
        </div>
      </div>

      <!-- 나비 -->
      <div class="nabi-wrap">
        <img class="nabi-img" id="nabiImg" src="" alt="나비"/>
        <div class="nabi-shadow"></div>
      </div>

      <!-- 건물·아이템은 JS로 주입 -->
    </div>

    <!-- 패널 -->
    <div class="gym-panel" id="gymPanel">
      <div class="panel-handle" onclick="closePanel()"></div>
      <div class="panel-scroll">
        <div class="panel-header">
          <div>
            <div class="panel-name" id="pName"></div>
            <div class="px panel-area" id="pArea"></div>
          </div>
          <button class="panel-close" onclick="closePanel()">×</button>
        </div>
        <div class="panel-lv-row">
          <div class="px panel-lv-badge" id="pLv">Lv.1</div>
          <div class="panel-lv-desc" id="pLvDesc"></div>
        </div>
        <div class="chalk-card">
          <div class="px chalk-ttl">🤍 공동 쵸크</div>
          <div class="chalk-amt-row">
            <span class="chalk-amt" id="pAmt">0</span>
            <span class="px chalk-unit">꼬집</span>
          </div>
          <div class="chalk-bar-bg"><div class="chalk-bar" id="pBar" style="width:0%"></div></div>
          <div class="px chalk-note" id="pNote"></div>
        </div>
        <div class="px sec-lbl">🐱 암장 나비들</div>
        <div class="members-row" id="pMembers"></div>
        <div class="menu-grid">
          <div class="menu-card" onclick="toast2('🏔️ 암장 벽 꾸미기는 준비 중이에요!')">
            <div class="m-icon">🏔️</div><div class="px m-title">암장 벽</div>
            <div class="px m-sub">함께 꾸미는 벽</div><div class="px soon-tag">준비 중</div>
          </div>
          <div class="menu-card" onclick="toast2('📖 방명록은 준비 중이에요!')">
            <div class="m-icon">📖</div><div class="px m-title">방명록</div>
            <div class="px m-sub">오늘의 한마디</div><div class="px soon-tag">준비 중</div>
          </div>
          <div class="menu-card" onclick="toast2('💬 채팅은 준비 중이에요!')">
            <div class="m-icon">💬</div><div class="px m-title">채팅</div>
            <div class="px m-sub">멤버들과 대화</div><div class="px soon-tag">준비 중</div>
          </div>
          <div class="menu-card" onclick="donate()">
            <div class="m-icon">🤍</div><div class="px m-title">쵸크 기부</div>
            <div class="px m-sub">공동 쵸크에 기부</div>
          </div>
        </div>
        <button class="px btn-record" onclick="goRecord()">🧗 이 암장에서 기록 시작</button>
      </div>
    </div>
  </div>

  <!-- 메뉴바 -->
  <div class="bottomnav">

      <div class="nav-label">기록</div>

/* ── 아이소메트릭 건물 SVG ── */
function isoBuilding(lv, w, h, isMine) {
  // 아이소메트릭 3면 비율
  const sideW = Math.round(w*0.28); // 우측면 너비
  const topH  = Math.round(w*0.18); // 상단면 높이
  const FW=w, FH=h;
  const totalW=FW+sideW, totalH=FH+topH+10;

  // 색상 (컨셉 도안처럼 회색 톤)
  const faceC='#e8e8e8', sideC='#cccccc', topC='#f2f2f2';
  const outlineW=2.5;
  const floors = lv===1?1:lv===2?2:lv===3?3:5;
  const floorH = Math.round((FH-topH)/floors);

  let s=`<svg width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}" style="image-rendering:pixelated;display:block;overflow:visible">`;

  // 그림자
  s+=`<ellipse cx="${totalW/2}" cy="${totalH-4}" rx="${FW/2}" ry="7" fill="rgba(0,0,0,0.08)"/>`;

  // 상단면 (지붕 평면)
  s+=`<polygon points="0,${topH} ${sideW},0 ${totalW},0 ${FW},${topH}" fill="${topC}" stroke="#222" stroke-width="${outlineW}" stroke-linejoin="round"/>`;

  // 우측면
  s+=`<polygon points="${FW},${topH} ${totalW},0 ${totalW},${FH+topH/2} ${FW},${FH+topH}" fill="${sideC}" stroke="#222" stroke-width="${outlineW}" stroke-linejoin="round"/>`;

  // 정면
  s+=`<rect x="0" y="${topH}" width="${FW}" height="${FH}" fill="${faceC}" stroke="#222" stroke-width="${outlineW}"/>`;

  if(lv===1) {
    // 컨테이너: 골격선 + 상단 오픈(홀드 위에서 보임)
    // 골격 세로선
    for(let i=1;i<3;i++) s+=`<line x1="${FW*i/3}" y1="${topH}" x2="${FW*i/3}" y2="${topH+FH}" stroke="#bbb" stroke-width="1.5"/>`;
    // 상단면에 홀드 (위에서 내려다보는 느낌)
    const tHolds=5;
    for(let i=0;i<tHolds;i++) {
      const hx=sideW/2+Math.random()*(FW-sideW/2-8)+4;
      const hy=4+Math.random()*(topH-8);
      const hc=HC[Math.floor(Math.random()*HC.length)];
      s+=`<ellipse cx="${hx}" cy="${hy}" rx="6" ry="4" fill="${hc}" stroke="#222" stroke-width="1.5" transform="rotate(-30 ${hx} ${hy})"/>`;
    }
    // 정면 창문
    s+=`<rect x="6" y="${topH+8}" width="${FW-12}" height="${FH-16}" fill="#e0eeff" stroke="#222" stroke-width="1.5"/>`;
    // 정면 홀드
    for(let i=0;i<4;i++) {
      const hx=10+Math.random()*(FW-20);
      const hy=topH+12+Math.random()*(FH-24);
      const hc=HC[Math.floor(Math.random()*HC.length)];
      s+=`<ellipse cx="${hx}" cy="${hy}" rx="5" ry="3.5" fill="${hc}" stroke="#222" stroke-width="1.5" transform="rotate(${Math.random()*20-10} ${hx} ${hy})"/>`;
    }
  } else {
    // 다층 건물: 각 층마다 창문+홀드
    for(let f=0;f<floors;f++) {
      const fY=topH+f*floorH;
      // 층 구분선
      if(f>0) s+=`<line x1="0" y1="${fY}" x2="${FW}" y2="${fY}" stroke="#bbb" stroke-width="1.5"/>`;

      // 층 창문 (크게, 클라이밍 벽처럼)
      const winPad=6, winH=floorH-12;
      s+=`<rect x="${winPad}" y="${fY+6}" width="${FW-winPad*2}" height="${winH}" fill="#e0eeff" stroke="#222" stroke-width="1.5"/>`;
      // 창문 중간 프레임
      s+=`<line x1="${FW/2}" y1="${fY+6}" x2="${FW/2}" y2="${fY+6+winH}" stroke="#222" stroke-width="1"/>`;

      // 창문 안 홀드 (컬러풀)
      const hCount=5+Math.floor(Math.random()*4);
      for(let i=0;i<hCount;i++) {
        const hx=winPad+4+Math.random()*(FW-winPad*2-8);
        const hy=fY+8+Math.random()*(winH-4);
        const hr=3.5+Math.random()*2;
        const hc=HC[Math.floor(Math.random()*HC.length)];
        s+=`<ellipse cx="${hx}" cy="${hy}" rx="${hr}" ry="${hr*0.65}" fill="${hc}" stroke="#222" stroke-width="1.5"/>`;
      }
    }
    // 옥상 시설
    s+=`<rect x="${FW-34}" y="${topH/2-4}" width="26" height="14" fill="#d4d4d4" stroke="#222" stroke-width="1.5"/>`;
    for(let i=0;i<3;i++) s+=`<line x1="${FW-32+i*8}" y1="${topH/2-1}" x2="${FW-32+i*8}" y2="${topH/2+7}" stroke="#aaa" stroke-width="1"/>`;
    // 옥상 에어컨 2번째
    s+=`<rect x="${FW-34}" y="${topH/2+14}" width="16" height="10" fill="#d0d0d0" stroke="#222" stroke-width="1.5"/>`;
  }

  // Lv 간판 (나무색 사각형, 정면에 부착)
  const signW=42, signH=22;
  const signX=8, signY=topH+10;
  s+=`<rect x="${signX}" y="${signY}" width="${signW}" height="${signH}" fill="${isMine?'#d4a853':'#b8956e'}" stroke="#222" stroke-width="2" rx="2"/>`;
  s+=`<text x="${signX+signW/2}" y="${signY+signH/2+4}" text-anchor="middle" font-family="'Press Start 2P',monospace" font-size="9" fill="#111">Lv.${lv}</text>`;

  // 문
  const dW=lv===1?20:24, dH=Math.min(28,floorH-8);
  const dX=FW/2-dW/2, dY=topH+FH-dH;
  s+=`<rect x="${dX}" y="${dY}" width="${dW}" height="${dH}" fill="#8b6b3d" stroke="#222" stroke-width="2"/>`;
  s+=`<rect x="${dX}" y="${dY}" width="${dW}" height="7" fill="#a8804e" stroke="#222" stroke-width="1"/>`;
  s+=`<circle cx="${dX+dW-5}" cy="${dY+dH/2}" r="2" fill="#ffd180" stroke="#222" stroke-width="1"/>`;

  // 외벽 홀드
  const extH=2+floors;
  for(let i=0;i<extH;i++) {
    const hx=Math.random()*FW;
    const hy=topH+8+Math.random()*(FH-16);
    const hc=HC[Math.floor(Math.random()*HC.length)];
    s+=`<ellipse cx="${hx}" cy="${hy}" rx="5" ry="3.5" fill="${hc}" stroke="#222" stroke-width="1.5" transform="rotate(${Math.random()*24-12} ${hx} ${hy})"/>`;
  }

  // 우측면 홀드
  for(let i=0;i<floors+1;i++) {
    const hx=FW+sideW*0.4+Math.random()*sideW*0.4;
    const hy=topH+8+i*(FH/floors)+Math.random()*10;
    const hc=HC[Math.floor(Math.random()*HC.length)];
    s+=`<ellipse cx="${hx}" cy="${hy}" rx="4" ry="2.8" fill="${hc}" stroke="#222" stroke-width="1.5" transform="rotate(-20 ${hx} ${hy})"/>`;
  }

  s+=`</svg>`;
  return s;
}

/* ── 칠판 스탠드 SVG (광장 바닥 간판) ── */
function chalkboardSVG(lv) {
  return `<svg width="38" height="52" viewBox="0 0 38 52" style="image-rendering:pixelated">
    <rect x="4" y="0" width="30" height="36" fill="#3a3a2a" stroke="#222" stroke-width="2"/>
    <rect x="4" y="0" width="30" height="4" fill="#5a4a2a" stroke="#222" stroke-width="1"/>
    <text x="19" y="22" text-anchor="middle" font-family="'Press Start 2P',monospace" font-size="7" fill="#ffd180">Lv.${lv}</text>
    <rect x="16" y="36" width="2" height="16" fill="#5a4a2a" stroke="#222" stroke-width="1"/>
    <rect x="22" y="36" width="2" height="16" fill="#5a4a2a" stroke="#222" stroke-width="1"/>
    <rect x="12" y="48" width="14" height="3" fill="#5a4a2a" stroke="#222" stroke-width="1"/>
  </svg>`;
}

/* ── 아이소메트릭 바닥 타일 SVG ── */
function isoFloorSVG() {
  const s=document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.setAttribute('width','360');s.setAttribute('height','220');
  s.style.cssText='position:absolute;bottom:0;left:0;z-index:1;image-rendering:pixelated';
  const tW=40,tH=20;
  let inner='';
  for(let r=0;r<8;r++) for(let c=0;c<12;c++) {
    const x=(c-r)*tW/2+180;
    const y=(c+r)*tH/2;
    const shade=(r+c)%2===0?'#edead8':'#e4e1ce';
    inner+=`<polygon points="${x},${y} ${x+tW/2},${y+tH/2} ${x},${y+tH} ${x-tW/2},${y+tH/2}" fill="${shade}" stroke="#d8d4c0" stroke-width="0.8"/>`;
  }
  s.innerHTML=inner;
  return s;
}

/* ── 초기화 ── */
function init() {
  const world=document.getElementById('world');
  const idx=Math.min(USER.nabiStage-1,4);
  document.getElementById('nabiImg').src=NB[idx];
  document.getElementById('hudChalk').textContent=USER.chalkCount+'꼬집';

  // 바닥 타일
  world.appendChild(isoFloorSVG());

  // 건물 크기 맵 (레벨별)
  const BSIZES={1:{w:130,h:80},2:{w:148,h:148},3:{w:148,h:210},5:{w:148,h:290}};

  USER.gyms.forEach((gym,i)=>{
    const bs=BSIZES[gym.level]||BSIZES[3];

    // 건물 div
    const bDiv=document.createElement('div');
    bDiv.style.cssText=`position:absolute;left:${gym.hot.l}px;top:${gym.hot.t}px;z-index:10;`;
    bDiv.innerHTML=isoBuilding(gym.level,bs.w,bs.h,true);
    world.appendChild(bDiv);

    // 핫스팟 (클릭 영역)
    const hot=document.createElement('div');
    hot.className='gym-hot';
    hot.style.cssText=`left:${gym.hot.l}px;top:${gym.hot.t}px;width:${gym.hot.w}px;height:${gym.hot.h}px;`;
    hot.innerHTML=`<div class="hot-hl"></div><div class="px hot-tip">${gym.name}</div>`;
    hot.onclick=()=>openGym(i);
    world.appendChild(hot);
  });

  // 칠판 스탠드 간판 (광장 바닥)
  const boards=[{lv:2,l:150,t:352},{lv:5,l:228,t:336}];
  boards.forEach(b=>{
    const el=document.createElement('div');
    el.style.cssText=`position:absolute;left:${b.l}px;top:${b.t}px;z-index:16;pointer-events:none`;
    el.innerHTML=chalkboardSVG(b.lv);
    world.appendChild(el);
  });

  // 이벤트 아이템
  EVT.forEach(ev=>{
    const el=document.createElement('div');
    el.className='evt';
    el.textContent=ev.e;
    el.title=ev.tip||'';
    el.style.cssText=`left:${ev.x}px;top:${ev.y}px;animation-delay:${ev.d}s;font-size:${ev.fs||22}px`;
    world.appendChild(el);
  });

  // 월드 높이 자동 조정
  const maxB=Math.max(...USER.gyms.map(g=>{const bs=BSIZES[g.level]||BSIZES[3];return g.hot.t+bs.h+100;}));
  world.style.height=Math.max(620,maxB)+'px';
}

/* ── 패널 ── */
const LV_DESC={1:'컨테이너 암장',2:'2층 실내 암장',3:'3층 실내 암장',5:'5층 대형 암장'};
function openGym(idx) {
  selIdx=idx;
  const g=USER.gyms[idx];
  document.getElementById('pName').textContent=g.name;
  document.getElementById('pArea').textContent=g.area;
  document.getElementById('pLv').textContent=`Lv.${g.level}`;
  document.getElementById('pLvDesc').textContent=LV_DESC[g.level]||'실내 암장';
  document.getElementById('pAmt').textContent=g.chalkPool;
  const pct=Math.min(g.chalkPool/g.chalkGoal*100,100);
  document.getElementById('pBar').style.width=pct+'%';
  document.getElementById('pNote').textContent=`다음 업그레이드까지 ${g.chalkGoal-g.chalkPool}꼬집`;
  const EM=['🐈‍⬛','🐈','😺','😸','🌟'];
  document.getElementById('pMembers').innerHTML=g.members.map(m=>
    `<div class="member-chip ${m.isMe?'me':''}">
      <div class="m-emoji">${EM[Math.min(m.stage-1,4)]}</div>
      <div class="px m-name">${m.isMe?'나':m.name}</div>
      <div class="px m-streak">🔥${m.streak}일</div>
    </div>`).join('');
  document.getElementById('gymPanel').classList.add('show');
}
function closePanel(){document.getElementById('gymPanel').classList.remove('show');selIdx=null;}
function donate(){
  if(USER.chalkCount<=0){toast2('쵸크가 없어요!');return;}
  const g=USER.gyms[selIdx];
  USER.chalkCount--;g.chalkPool++;
  document.getElementById('hudChalk').textContent=USER.chalkCount+'꼬집';
  document.getElementById('pAmt').textContent=g.chalkPool;
  document.getElementById('pBar').style.width=Math.min(g.chalkPool/g.chalkGoal*100,100)+'%';
  document.getElementById('pNote').textContent=`다음 업그레이드까지 ${g.chalkGoal-g.chalkPool}꼬집`;
  toast2('🤍 공동 쵸크에 1꼬집 기부했어요!');
}
function goRecord(){
  const g=USER.gyms[selIdx];
  sessionStorage.setItem('selectedGym',JSON.stringify({id:g.id,name:g.name,area:g.area}));
  location.href='record.html';
}
function toast2(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

init();
</script>
