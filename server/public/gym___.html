<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nabi — 마을</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
.px{font-family:'Press Start 2P',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#f0f0f0;display:flex;justify-content:center;min-height:100vh}
.phone{width:360px;height:740px;border:2px solid #ddd;border-radius:32px;margin:1rem auto;overflow:hidden;position:relative;background:#fff;display:flex;flex-direction:column}

/* ── 마을 월드 ── */
.world-wrap{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;position:relative}
.world-wrap::-webkit-scrollbar{display:none}
.world{width:360px;min-height:700px;position:relative;background:#fff}

.hud{position:sticky;top:0;z-index:50;padding:22px 18px 8px;display:flex;justify-content:space-between;align-items:flex-start;background:linear-gradient(rgba(255,255,255,0.97) 80%,transparent);pointer-events:none}
.hud *{pointer-events:auto}
.hud-title{font-size:11px;color:#111;letter-spacing:1px}
.hud-sub{font-size:7px;color:#666;margin-top:4px}
.hud-badge{display:flex;align-items:center;gap:4px;background:#fff;border:2px solid #222;padding:5px 9px}
.hud-badge-text{font-size:8px;color:#111}
.building{position:absolute;z-index:10;cursor:pointer;transition:filter 0.15s}
.building:hover{filter:brightness(1.05) drop-shadow(0 0 8px rgba(255,200,0,0.55))}
.building img{image-rendering:pixelated;display:block}
.b-tip{position:absolute;top:-26px;left:50%;transform:translateX(-50%);background:#fff;border:2px solid #222;padding:3px 8px;font-size:7px;color:#111;white-space:nowrap;box-shadow:2px 2px 0 #222;opacity:0;transition:opacity 0.15s;pointer-events:none;z-index:20}
.building:hover .b-tip{opacity:1}
.nabi-wrap{position:absolute;z-index:15;display:flex;flex-direction:column;align-items:center}
.nabi-img{image-rendering:pixelated;filter:drop-shadow(1px 3px 0 rgba(0,0,0,0.18))}
.nabi-shadow{width:50px;height:5px;background:rgba(0,0,0,0.1);border-radius:50%;margin-top:-2px;filter:blur(2px)}
.evt{position:absolute;z-index:12;image-rendering:pixelated;animation:efloat 3s ease-in-out infinite}
@keyframes efloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* ── 암장 패널 (하단 슬라이드) ── */
.gym-panel{
  position:absolute;bottom:0;left:0;right:0;z-index:80;
  background:#fff;border-radius:20px 20px 0 0;border-top:3px solid #222;
  transform:translateY(100%);
  transition:transform 0.35s cubic-bezier(0.34,1.1,0.64,1);
  height:88%;display:flex;flex-direction:column;
}
.gym-panel.show{transform:translateY(0)}
.panel-handle{width:40px;height:4px;background:#ddd;border:1px solid #ccc;border-radius:2px;margin:12px auto 0;flex-shrink:0;cursor:pointer}

/* 패널 헤더 */
.panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 18px 10px;border-bottom:2px solid #eee;flex-shrink:0;
}
.panel-gym-name{font-size:11px;color:#111}
.panel-gym-area{font-size:7px;color:#888;margin-top:2px}
.panel-lv-badge{background:#ffd180;border:2px solid #222;padding:2px 8px;font-size:8px;color:#111;box-shadow:1px 1px 0 #222;margin-left:auto;margin-right:10px;flex-shrink:0}
.panel-close{background:none;border:none;cursor:pointer;font-size:22px;color:#999;line-height:1}

/* 패널 스크롤 (실내 뷰) */
.panel-scroll{flex:1;overflow-y:auto;scrollbar-width:none}
.panel-scroll::-webkit-scrollbar{display:none}

/* ── 층 섹션 ── */
.floor-section{
  background:#f8f6f2;
  border-bottom:3px solid #222;
  position:relative;
}

/* 층 배경 (실내 느낌) */
.floor-bg{
  background:linear-gradient(180deg,#f0eeea 0%,#e8e6e0 100%);
  padding:14px 0 0;
  position:relative;
}

/* 층 라벨 */
.floor-label{
  position:absolute;top:10px;left:14px;z-index:5;
  background:#222;color:#fff;font-size:7px;
  padding:3px 8px;letter-spacing:0.5px;
}

/* 암장 벽 */
.wall-area{
  display:flex;align-items:flex-start;gap:0;
  padding:0 0 0 0;position:relative;
}
.wall-img-wrap{
  width:62%;position:relative;cursor:pointer;
  border-right:2px solid #222;
}
.wall-img-wrap:hover::after{
  content:'👆 루트 보기';
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.7);color:#fff;font-size:7px;padding:4px 8px;
  border-radius:4px;white-space:nowrap;font-family:'Press Start 2P',monospace;
}
.wall-img{width:100%;image-rendering:pixelated;display:block}

/* 우측 사이드 (게시판 + 계단) */
.wall-side{
  width:38%;display:flex;flex-direction:column;padding:32px 10px 10px;gap:8px;
}

/* 게시판 */
.notice-board{
  background:#f5f2e8;border:2px solid #888;border-radius:3px;padding:8px;cursor:pointer;
  transition:border-color 0.15s;
}
.notice-board:hover{border-color:#222}
.notice-board-title{font-size:6px;color:#666;margin-bottom:6px}
.notice-stickers{display:flex;flex-wrap:wrap;gap:3px}
.sticker{
  width:20px;height:20px;border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;box-shadow:1px 1px 0 rgba(0,0,0,0.15);
}

/* 계단 (층간 이동 표시) */
.ladder-area{
  display:flex;align-items:center;justify-content:center;
  padding:4px 0;
}
.ladder-svg{opacity:0.7}

/* 단체티 뱃지 */
.group-tee{
  background:#e8f4ff;border:1.5px solid #90caf9;
  border-radius:20px;width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;margin-left:auto;cursor:pointer;
}

/* 층 하단 바닥 섹션 */
.floor-bottom{
  background:#e8e6e0;border-top:2px solid #222;
  padding:10px 14px 14px;display:flex;gap:10px;align-items:flex-start;
}

/* 착지 매트 */
.mat{
  flex:1;background:#aaa;border:2px solid #222;border-radius:4px;height:16px;
  box-shadow:0 3px 0 #888;
}

/* 쵸크 + 아이템함 (1층에만) */
.floor-items{
  padding:12px 14px 14px;background:#eae8e2;
  border-top:2px solid #ddd;
  display:flex;gap:12px;align-items:flex-start;
}

.chalk-bucket{
  display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;
  transition:transform 0.15s;
}
.chalk-bucket:hover{transform:scale(1.05)}
.chalk-bucket-icon{font-size:28px}
.chalk-bucket-label{font-size:6px;color:#666;text-align:center;line-height:1.4}
.chalk-bucket-count{font-size:8px;color:#111;font-family:'Press Start 2P',monospace}

.item-box{
  flex:1;background:#e0ddd8;border:2px solid #222;border-radius:6px;padding:8px;cursor:pointer;
  transition:border-color 0.15s;
}
.item-box:hover{border-color:#e65100}
.item-box-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.item-box-title{font-size:7px;color:#555}
.item-box-icon{font-size:14px}
.item-box-slots{display:flex;gap:4px}
.item-slot2{
  width:36px;height:36px;background:#fff;border:1.5px solid #ccc;border-radius:4px;
  display:flex;align-items:center;justify-content:center;font-size:16px;
}

/* 계단 구분선 */
.stair-sep{
  display:flex;align-items:center;justify-content:flex-end;
  background:#ddd;border-top:2px solid #aaa;border-bottom:2px solid #aaa;
  padding:6px 14px;gap:8px;
}
.stair-sep-icon{font-size:14px}
.stair-sep-label{font-size:7px;color:#888}

/* ── 서브 모달 (루트/게시판/쵸크/아이템함 상세) ── */
.sub-modal-backdrop{
  display:none;position:absolute;inset:0;z-index:200;
  background:rgba(0,0,0,0.45);align-items:flex-end;justify-content:center;
}
.sub-modal-backdrop.show{display:flex}
.sub-modal{
  background:#fff;border-radius:20px 20px 0 0;border-top:3px solid #222;
  width:100%;max-height:65%;display:flex;flex-direction:column;
}
.sub-modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 0;flex-shrink:0}
.sub-modal-header{padding:12px 18px 10px;border-bottom:1px solid #eee;flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.sub-modal-title{font-size:10px;color:#111}
.sub-modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:#bbb}
.sub-modal-body{overflow-y:auto;padding:14px 18px 24px;flex:1}
.sub-modal-body::-webkit-scrollbar{width:4px}
.sub-modal-body::-webkit-scrollbar-thumb{background:#ddd}

/* 루트 리스트 */
.route-list{display:flex;flex-direction:column;gap:8px}
.route-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fafafa;border:1.5px solid #eee;border-radius:8px}
.route-color{width:16px;height:16px;border-radius:50%;border:2px solid #222;flex-shrink:0}
.route-name{font-size:10px;color:#111}
.route-grade{font-size:8px;color:#888;margin-top:2px}
.route-status{margin-left:auto;font-size:8px;padding:3px 8px;border-radius:6px}
.route-status.done{background:#e8f5e9;color:#2e7d32}
.route-status.try{background:#fff8e1;color:#f57f17}

/* 게시판 상세 */
.note-list{display:flex;flex-direction:column;gap:8px}
.note-item{padding:10px 12px;border-radius:6px;font-size:10px;color:#333;line-height:1.7;box-shadow:1px 1px 0 rgba(0,0,0,0.1)}
.note-meta{font-size:8px;color:#999;margin-top:4px}

/* 쵸크 상세 */
.chalk-log{display:flex;flex-direction:column;gap:6px}
.chalk-log-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#fff8f0;border:1.5px solid #ffd180;border-radius:8px}
.chalk-log-emoji{font-size:18px}
.chalk-log-name{font-size:10px;color:#111}
.chalk-log-detail{font-size:8px;color:#888;margin-top:2px}
.chalk-log-amt{margin-left:auto;font-size:9px;color:#e65100;font-family:'Press Start 2P',monospace}

/* 아이템함 상세 */
.item-list{display:flex;flex-direction:column;gap:8px}
.item-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fafafa;border:1.5px solid #eee;border-radius:8px}
.item-icon-big{font-size:22px}
.item-name{font-size:10px;color:#111}
.item-donor{font-size:8px;color:#888;margin-top:2px}
.item-qty{margin-left:auto;font-size:8px;color:#555;font-family:'Press Start 2P',monospace}

/* ── 메뉴바 ── */
.bottomnav{flex-shrink:0;background:#fff;border-top:2px solid #eee;display:flex;padding:12px 0 18px;position:relative;z-index:200}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;padding:4px 0;color:#bbb}
.nav-label{font-family:'Press Start 2P',monospace;font-size:8px}
.nav-item.active{color:#111}
.nav-item.active .nav-label{color:#111}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 18px;border:2px solid #222;font-size:8px;z-index:999;white-space:nowrap;display:none}
.toast.show{display:block}
</style>
</head>

  <!-- 마을 -->
  <div class="world-wrap" id="worldWrap">
    <div class="world" id="world">
      <div class="hud">

// ── 바닥 SVG ──
function makeFloor(){
  const W=360,H=600;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',W);svg.setAttribute('height',H);
  svg.style.cssText='position:absolute;top:0;left:0;z-index:1;image-rendering:pixelated';
  const TW=28,TH=14;
  let inner=`<rect width="${W}" height="${H}" fill="#ffffff"/>`;
  const zones=[{x1:0,y1:60,x2:140,y2:300},{x1:176,y1:60,x2:328,y2:300},{x1:0,y1:336,x2:360,y2:600}];
  for(const z of zones)for(let r=0;r*TH<z.y2-z.y1;r++)for(let c=0;c*TW<z.x2-z.x1;c++){
    const tx=z.x1+c*TW,ty=z.y1+r*TH,tw=Math.min(TW,z.x2-tx),th=Math.min(TH,z.y2-ty);
    if(tw<=0||th<=0)continue;
    const shade=(r+c)%2===0?'#ffffff':'#f4f2ec';
    inner+=`<rect x="${tx}" y="${ty}" width="${tw}" height="${th}" fill="${shade}" stroke="#e4e0d8" stroke-width="0.8"/>`;
  }
  inner+=`<rect x="140" y="60" width="36" height="240" fill="#e8e6e2" stroke="#d0cdc8" stroke-width="1"/>`;
  for(let i=0;i<7;i++)inner+=`<line x1="158" y1="${80+i*28}" x2="158" y2="${94+i*28}" stroke="#fff" stroke-width="2"/>`;
  inner+=`<rect x="328" y="60" width="32" height="240" fill="#e8e6e2" stroke="#d0cdc8" stroke-width="1"/>`;
  for(let i=0;i<7;i++)inner+=`<line x1="344" y1="${80+i*28}" x2="344" y2="${94+i*28}" stroke="#fff" stroke-width="2"/>`;
  inner+=`<rect x="0" y="300" width="360" height="36" fill="#e8e6e2" stroke="#d0cdc8" stroke-width="1"/>`;
  for(let i=0;i<11;i++)inner+=`<line x1="${12+i*32}" y1="318" x2="${28+i*32}" y2="318" stroke="#fff" stroke-width="2"/>`;
  inner+=`<rect x="140" y="300" width="36" height="36" fill="#e0ddd8"/><rect x="328" y="300" width="32" height="36" fill="#e0ddd8"/>`;
  inner+=`<line x1="140" y1="60" x2="140" y2="336" stroke="#c8c5c0" stroke-width="1.5"/><line x1="176" y1="60" x2="176" y2="336" stroke="#c8c5c0" stroke-width="1.5"/>`;
  inner+=`<line x1="328" y1="60" x2="328" y2="336" stroke="#c8c5c0" stroke-width="1.5"/>`;
  inner+=`<line x1="0" y1="300" x2="360" y2="300" stroke="#c8c5c0" stroke-width="1.5"/><line x1="0" y1="336" x2="360" y2="336" stroke="#c8c5c0" stroke-width="1.5"/>`;
  svg.innerHTML=inner;return svg;
}

// ── 계단 SVG ──
function ladderSVG(){
  return `<svg width="36" height="60" viewBox="0 0 36 60" style="image-rendering:pixelated">
    <rect x="2" y="0" width="4" height="60" fill="#aaa" stroke="#888" stroke-width="1"/>
    <rect x="30" y="0" width="4" height="60" fill="#aaa" stroke="#888" stroke-width="1"/>
    ${[0,1,2,3,4,5,6].map(i=>`<rect x="2" y="${4+i*8}" width="32" height="3" fill="#bbb" stroke="#999" stroke-width="0.5"/>`).join('')}
  </svg>`;
}

  world.appendChild(makeFloor());
  USER.gyms.forEach((gym,i)=>{
    const bs=B_SIZE[gym.level]||B_SIZE[3];
    const div=document.createElement('div');
    div.className='building';
    div.style.cssText=`left:${gym.pos.left}px;top:${gym.pos.top}px;`;
    div.innerHTML=`<div class="px b-tip">${gym.name}</div><img src="${BUILDINGS[gym.level]}" width="${bs.w}" height="${bs.h}" alt="Lv.${gym.level}"/>`;
    div.onclick=()=>openGym(i);
    world.appendChild(div);
  });
  const evts=[
    {key:'pumpkin',x:60,y:354,d:0,s:36},{key:'candy',x:190,y:310,d:0.5,s:34},
    {key:'ghost',x:200,y:272,d:1.0,s:36},{key:'gingerbread',x:148,y:370,d:0.3,s:34},
    {key:'scarf',x:256,y:350,d:1.4,s:34},{key:'snowflake',x:288,y:378,d:0.8,s:32},
    {key:'bat',x:306,y:248,d:1.8,s:38},{key:'snowman',x:50,y:280,d:1.2,s:34},
    {key:'witch_hat',x:108,y:232,d:0.6,s:32},{key:'xmas_tree',x:178,y:368,d:2.0,s:34},
  ];
  evts.forEach(ev=>{
    const img=document.createElement('img');
    img.className='evt';img.src=EVT[ev.key];
    img.width=ev.s;img.height=ev.s;
    img.style.cssText=`left:${ev.x}px;top:${ev.y}px;animation-delay:${ev.d}s`;
    world.appendChild(img);
  });
  const nw=document.createElement('div');
  nw.className='nabi-wrap';nw.style.cssText='left:152px;top:420px;';
  nw.innerHTML=`<img class="nabi-img" src="${NABI[nabiIdx]}" width="64" height="76" alt="나비"/><div class="nabi-shadow"></div>`;
  world.appendChild(nw);
  const maxH=Math.max(...USER.gyms.map(g=>g.pos.top+(B_SIZE[g.level]||B_SIZE[3]).h+150));
  world.style.minHeight=Math.max(700,maxH)+'px';
}

// ── 패널 렌더링 (실내 뷰) ──
function openGym(idx){
  selIdx=idx;
  const g=USER.gyms[idx];
  document.getElementById('pName').textContent=g.name;
  document.getElementById('pArea').textContent=g.area;
  document.getElementById('pLv').textContent=`Lv.${g.level}`;

  const scroll=document.getElementById('panelScroll');
  scroll.innerHTML='';
  scroll.scrollTop=0;

  // 총 쵸크 현황 헤더
  const chalkHeader=document.createElement('div');
  chalkHeader.style.cssText='padding:10px 16px;background:#fff8f0;border-bottom:2px solid #ffd180;display:flex;align-items:center;gap:10px;flex-shrink:0';
  const pct=Math.min(g.chalkPool/g.chalkGoal*100,100);
  chalkHeader.innerHTML=`
    <div style="flex:1">
      <div class="px" style="font-size:7px;color:#e65100;margin-bottom:5px">🤍 공동 쵸크 ${g.chalkPool}꼬집</div>
      <div style="background:#f0f0f0;height:7px;border-radius:4px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,#ffd180,#ffb300);border-radius:4px"></div>
      </div>
    </div>
    <div class="px" style="font-size:7px;color:#bbb">/${g.chalkGoal}</div>`;
  scroll.appendChild(chalkHeader);

  // 층별 렌더링 (최상층 → 1층)
  g.floors.forEach((floor,fi)=>{
    // 계단 구분 (첫 층 제외)
    if(fi>0){
      const sep=document.createElement('div');
      sep.className='stair-sep';
      sep.innerHTML=`<div style="flex:1;height:1px;background:#ccc"></div><span class="stair-sep-icon">🪜</span><span class="px stair-sep-label">계단</span><div style="flex:1;height:1px;background:#ccc"></div>`;
      scroll.appendChild(sep);
    }

    const section=document.createElement('div');
    section.className='floor-section';

    const floorBg=document.createElement('div');
    floorBg.className='floor-bg';

    // 층 라벨
    const lbl=document.createElement('div');
    lbl.className='px floor-label';
    lbl.textContent=floor.label;
    floorBg.appendChild(lbl);

    // 벽 + 사이드
    const wallArea=document.createElement('div');
    wallArea.className='wall-area';

    // 클라이밍 벽
    const wallWrap=document.createElement('div');
    wallWrap.className='wall-img-wrap';
    wallWrap.title='루트 보기';
    const wallImg=document.createElement('img');
    wallImg.className='wall-img';
    wallImg.src=WALLS[floor.wallType]||WALLS.flat;
    wallImg.alt='클라이밍 벽';
    wallWrap.appendChild(wallImg);
    wallWrap.onclick=()=>openRoutes(floor,g.name);

    // 우측 사이드
    const side=document.createElement('div');
    side.className='wall-side';

    // 게시판
    const board=document.createElement('div');
    board.className='notice-board';
    board.title='게시판 보기';
    const stickers=floor.notes.map((_,ni)=>`<div class="sticker" style="background:${NOTE_COLORS[ni%NOTE_COLORS.length]}">📝</div>`).join('');
    board.innerHTML=`<div class="px notice-board-title">📋 게시판</div><div class="notice-stickers">${stickers}</div>`;
    board.onclick=()=>openBoard(floor);
    side.appendChild(board);

    // 단체티 (최상층)
    if(fi===0){
      const tee=document.createElement('div');
      tee.className='group-tee';tee.textContent='👕';tee.title='단체티 정보';
      tee.onclick=()=>toast2('단체티 기능은 준비 중이에요!');
      side.appendChild(tee);
    }

    // 계단 (1층 제외)
    if(fi<g.floors.length-1){
      const ladder=document.createElement('div');
      ladder.className='ladder-area';
      ladder.innerHTML=ladderSVG();
      side.appendChild(ladder);
    }

    wallArea.appendChild(wallWrap);
    wallArea.appendChild(side);
    floorBg.appendChild(wallArea);

    // 착지 매트
    const matWrap=document.createElement('div');
    matWrap.className='floor-bottom';
    matWrap.innerHTML=`<div class="mat"></div><div class="mat" style="width:40%;margin-left:8px"></div>`;
    floorBg.appendChild(matWrap);
    section.appendChild(floorBg);

    // 1층: 쵸크 + 아이템함
    if(fi===g.floors.length-1){
      const items=document.createElement('div');
      items.className='floor-items';

      // 쵸크 버킷
      const bucket=document.createElement('div');
      bucket.className='chalk-bucket';
      const chalkLog=floor.chalkLog||[];
      bucket.innerHTML=`
        <div class="chalk-bucket-icon">🪣</div>
        <div class="chalk-bucket-count">${g.chalkPool}</div>
        <div class="px chalk-bucket-label">공동<br>쵸크</div>`;
      bucket.onclick=()=>openChalkLog(chalkLog,g.name);
      items.appendChild(bucket);

      // 아이템함
      const ibox=document.createElement('div');
      ibox.className='item-box';
      const slotIcons=floor.items.slice(0,3).map(it=>`<div class="item-slot2">${it.icon}</div>`).join('');
      ibox.innerHTML=`
        <div class="item-box-header"><div class="item-box-icon">📦</div><div class="px item-box-title">아이템함</div></div>
        <div class="item-box-slots">${slotIcons}</div>`;
      ibox.onclick=()=>openItems(floor.items,g.name);
      items.appendChild(ibox);

      section.appendChild(items);
    }

    scroll.appendChild(section);
  });

  document.getElementById('gymPanel').classList.add('show');
}

function closePanel(){
  document.getElementById('gymPanel').classList.remove('show');
  selIdx=null;
}

// ── 서브 모달 ──
function openSubModal(title,bodyHTML){
  document.getElementById('subModalTitle').textContent=title;
  document.getElementById('subModalBody').innerHTML=bodyHTML;
  document.getElementById('subModalBackdrop').classList.add('show');
}
function closeSubModal(e){
  if(e&&e.target!==document.getElementById('subModalBackdrop'))return;
  document.getElementById('subModalBackdrop').classList.remove('show');
}

// 루트 보기
function openRoutes(floor,gymName){
  const wallNames={flat:'평평한 벽',slant:'기울어진 벽',boulder:'울퉁불퉁한 벽'};
  const html=`
    <div style="font-size:9px;color:#888;margin-bottom:12px">${wallNames[floor.wallType]||''} · ${floor.label}</div>
    <div class="route-list">${
      floor.routes.map(r=>`
        <div class="route-item">
          <div class="route-color" style="background:${r.color}"></div>
          <div>
            <div class="route-name">${r.name}</div>
            <div class="px route-grade">${r.grade}</div>
          </div>
          <div class="px route-status ${r.done?'done':'try'}">${r.done?'완등 ✓':'도전 중'}</div>
        </div>`).join('')
    }</div>`;
  openSubModal(`🧗 ${floor.label} 루트`,html);
}

// 게시판 보기
function openBoard(floor){
  const html=`<div class="note-list">${
    floor.notes.map((n,ni)=>`
      <div class="note-item" style="background:${NOTE_COLORS[ni%NOTE_COLORS.length]}">
        ${n.text}
        <div class="px note-meta">${n.author} · ${n.time}</div>
      </div>`).join('')
  }</div>`;
  openSubModal(`📋 ${floor.label} 게시판`,html);
}

// 쵸크 로그
function openChalkLog(logs,gymName){
  if(!logs||!logs.length){toast2('아직 쵸크 기록이 없어요');return;}
  const html=`<div class="chalk-log">${
    logs.map(l=>`
      <div class="chalk-log-item">
        <div class="chalk-log-emoji">${l.emoji}</div>
        <div>
          <div class="chalk-log-name">${l.name}</div>
          <div class="px chalk-log-detail">${l.time} 기부</div>
        </div>
        <div class="chalk-log-amt">+${l.amt}꼬집</div>
      </div>`).join('')
  }</div>`;
  openSubModal('🤍 쵸크 기부 내역',html);
}

// 아이템함
function openItems(items,gymName){
  if(!items||!items.length){toast2('아이템함이 비어있어요');return;}
  const html=`<div class="item-list">${
    items.map(it=>`
      <div class="item-item">
        <div class="item-icon-big">${it.icon}</div>
        <div>
          <div class="item-name">${it.name}</div>
          <div class="px item-donor">${it.donor} · ${it.time} 기부</div>
        </div>
        <div class="px item-qty">x${it.qty}</div>
      </div>`).join('')
  }</div>`;
  openSubModal('📦 아이템함',html);
}

function toast2(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

init();
</script>
</body>
</html>
