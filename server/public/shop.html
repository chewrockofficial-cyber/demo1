<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chew Rock — Shop</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    .px { font-family: 'Press Start 2P', monospace; }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    /* 폰 프레임 (예진님 스타일) */
    .phone {
      width: 360px;
      height: 740px;
      background: #fff;
      border: 2px solid #ddd;
      border-radius: 32px;
      margin: 1rem auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 상단 헤더 */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 20px 8px;
      flex-shrink: 0;
    }
    .topbar-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      color: #111;
      letter-spacing: 1px;
    }
    .balance {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f8f8f8;
      border: 1.5px solid #ddd;
      padding: 6px 10px;
      border-radius: 8px;
    }
    .balance img {
      width: 22px;
      height: auto;
      image-rendering: pixelated;
      display: block;
    }
    .balance-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: #111;
    }

    /* 스크롤 영역 */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px 12px;
    }
    .scroll-area::-webkit-scrollbar { width: 4px; }
    .scroll-area::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    /* 카테고리 탭 (예진님 pills 스타일) */
    .pills {
      display: flex;
      gap: 5px;
      justify-content: center;
      padding: 8px 0 12px;
      flex-wrap: wrap;
    }
    .pill {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      padding: 5px 8px;
      border-radius: 4px;
      border: 1.5px solid #ddd;
      color: #bbb;
      background: #f8f8f8;
      cursor: pointer;
      transition: all 0.15s;
    }
    .pill.active {
      border-color: #222;
      color: #111;
      background: #fff;
    }

    /* 아이템 그리드 */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .item {
      background: #fff;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      padding: 8px;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.15s;
      position: relative;
    }
    .item:hover {
      border-color: #222;
      transform: translateY(-1px);
    }
    .item.owned {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .item.owned:hover {
      border-color: #ddd;
      transform: none;
    }

    .badge-new {
      position: absolute;
      top: 4px;
      right: 4px;
      background: #ff4444;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 5px;
      padding: 3px 5px;
      border-radius: 3px;
      letter-spacing: 0.5px;
      z-index: 2;
    }

    .item-image {
      background: #fafafa;
      border-radius: 6px;
      padding: 8px;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 6px;
      position: relative;
    }
    .item-image img {
      width: 90%;
      height: 90%;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .owned-check {
      position: absolute;
      top: 4px;
      right: 4px;
      background: #111;
      color: #fff;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    .item-name {
      font-size: 11px;
      color: #333;
      margin-bottom: 6px;
      line-height: 1.3;
      min-height: 30px;
    }
    .item-price {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: #f8f8f8;
      border: 1.5px solid #eee;
      padding: 4px 6px;
      border-radius: 5px;
    }
    .item-price img {
      width: 14px;
      height: auto;
      image-rendering: pixelated;
    }
    .item-price-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #111;
    }
    .price-owned {
      background: #f0f0f0;
      color: #999;
    }
    .price-owned .item-price-text { color: #999; }

    /* 하단 네비 (예진님과 완전 동일) */
    .bottomnav {
      background: #fff;
      border-top: 1.5px solid #eee;
      display: flex;
      padding: 14px 0 20px;
      flex-shrink: 0;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 4px 0;
      color: #bbb;
    }
    .nav-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
    }
    .nav-item.active { color: #111; }
    .nav-item.active .nav-label { color: #111; }
    .nav-item.active svg { color: #111; }
    .nav-item svg { color: #bbb; }
  </style>
</head>
<body>
  <div class="phone">
    <!-- 상단 -->
    <div class="topbar">
      <div class="topbar-title">SHOP</div>
      <div class="balance">

        <span class="balance-text">×<span id="balance-count">128</span></span>

    <!-- 스크롤 영역 -->

      <div class="grid" id="grid"></div>

      { id: 7,  category: 'etc',    image: '/images/chalkbag_round_pink.png',        name: '라운드 초크백 핑크',   price: 20, owned: false, isNew: true  },
      { id: 8,  category: 'etc',    image: '/images/item_brush_short.png',           name: '숏 브러시',           price: 8,  owned: false, isNew: false },
      { id: 9,  category: 'etc',    image: '/images/item_brush_long.png',            name: '롱 브러시',           price: 10, owned: false, isNew: false },
      { id: 10, category: 'etc',    image: '/images/item_tripod.png',                name: '기록용 삼각대',       price: 30, owned: false, isNew: false },
      { id: 11, category: 'etc',    image: '/images/item_americano.png',             name: '아이스 아메리카노',   price: 5,  owned: false, isNew: false },
      { id: 12, category: 'shoes',  image: '/images/climbingshoes_black_gray.png',   name: '클라이밍화 블랙',     price: 35, owned: false, isNew: false },
      { id: 13, category: 'shoes',  image: '/images/climbingshoes_gray_blue.png',    name: '클라이밍화 블루',     price: 35, owned: false, isNew: true  },
      { id: 14, category: 'shoes',  image: '/images/climbingshoes_white_pink.png',   name: '클라이밍화 핑크',     price: 38, owned: false, isNew: true  },
      { id: 15, category: 'shoes',  image: '/images/climbingshoes_yellow_brown.png', name: '클라이밍화 브라운',   price: 32, owned: false, isNew: false },
      { id: 16, category: 'shoes',  image: '/images/climbingshoes_yellow_green.png', name: '클라이밍화 그린',     price: 32, owned: false, isNew: false },
    ]

    let currentCategory = 'all'

    function render() {
      const grid = document.getElementById('grid')
      const filtered = currentCategory === 'all' ? items : items.filter(i => i.category === currentCategory)
      grid.innerHTML = filtered.map(item => `
        <div class="item ${item.owned ? 'owned' : ''}" onclick="buyItem(${item.id})">
          ${item.isNew && !item.owned ? '<div class="badge-new">NEW</div>' : ''}
          <div class="item-image">
            <img src="${item.image}" alt="${item.name}">
            ${item.owned ? '<div class="owned-check">✓</div>' : ''}
          </div>
          <div class="item-name">${item.name}</div>
          <div class="item-price ${item.owned ? 'price-owned' : ''}">
            ${item.owned
              ? '<span class="item-price-text">보유중</span>'
              : `<img src="/images/chalk_piece.png" alt=""><span class="item-price-text">×${item.price}</span>`}
          </div>
        </div>
      `).join('')
    }

    document.getElementById('pills').addEventListener('click', (e) => {
      if (!e.target.classList.contains('pill')) return
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'))
      e.target.classList.add('active')
      currentCategory = e.target.dataset.category
      render()
    })

    function buyItem(id) {
      const item = items.find(i => i.id === id)
      if (!item || item.owned) return
      if (balance < item.price) {
        alert(`쵸크가 부족해요!\n필요: ${item.price} / 보유: ${balance}`)
        return
      }
      if (confirm(`"${item.name}"을(를) 쵸크 ${item.price}개로 구매할까요?`)) {
        balance -= item.price
        item.owned = true
        updateBalance()
        render()
      }
    }

    updateBalance()
    render()
  </script>
</body>
