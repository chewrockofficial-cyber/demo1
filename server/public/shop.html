<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chew Rock — Shop</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    .px { font-family: 'Press Start 2P', monospace; }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    /* 폰 프레임 (예진님 스타일) */
    .phone {
      width: 360px;
      height: 740px;
      background: #fff;
      border: 2px solid #ddd;
      border-radius: 32px;
      margin: 1rem auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 상단 헤더 */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 20px 8px;
      flex-shrink: 0;
    }
    .topbar-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      color: #111;
      letter-spacing: 1px;
    }
    .balance {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f8f8f8;
      border: 1.5px solid #ddd;
      padding: 6px 10px;
      border-radius: 8px;
    }
    .balance img {
      width: 22px;
      height: auto;
      image-rendering: pixelated;
      display: block;
    }
    .balance-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: #111;
    }

    /* 나비 미리보기 (스크롤 밖, 고정 영역) */
    .preview {
      background: #fafafa;
      margin: 8px 20px 4px;
      border: 1.5px solid #eee;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      justify-content: center;
      flex-shrink: 0;
    }
    .nabi-canvas {
      position: relative;
      width: 128px;
      height: 128px;
    }
    .nabi-canvas img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
    }
    /* 레이어 우선순위 (fitting.html과 동일) */
    .layer-base     { z-index: 1; }
    .layer-bottom   { z-index: 2; }
    .layer-shoes    { z-index: 3; transform: translateY(5px); }
    .layer-top      { z-index: 4; }
    .layer-chalkbag { z-index: 5; }
    .layer-brush    { z-index: 6; transform: translate(-55px, 10px); }
    .layer-head     { z-index: 7; }
    .layer-hand     { z-index: 8; }

    /* 스크롤 영역 */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 4px 16px 12px;
    }
    .scroll-area::-webkit-scrollbar { width: 4px; }
    .scroll-area::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    /* 카테고리 탭 (예진님 pills 스타일) */
    .pills {
      display: flex;
      gap: 5px;
      justify-content: center;
      padding: 8px 0 12px;
      flex-wrap: wrap;
    }
    .pill {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      padding: 5px 8px;
      border-radius: 4px;
      border: 1.5px solid #ddd;
      color: #bbb;
      background: #f8f8f8;
      cursor: pointer;
      transition: all 0.15s;
    }
    .pill.active {
      border-color: #222;
      color: #111;
      background: #fff;
    }

    /* 아이템 그리드 */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .item {
      background: #fff;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      padding: 8px;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.15s;
      position: relative;
    }
    .item:hover {
      border-color: #222;
      transform: translateY(-1px);
    }
    /* 보유중(구매 완료) - 클릭하면 착용 토글이라 계속 클릭 가능 */
    .item.owned .item-price { background: #f0f0f0; }
    /* 실제로 착용중 (outfit에 반영됨) */
    .item.worn {
      border-color: #111;
      border-width: 2px;
      background: #f5f0ff;
    }
    /* 구매 전 미리보기 중 (아직 결제 안 함) */
    .item.previewing {
      border-color: #4a7dff;
      box-shadow: 0 0 0 2px rgba(74, 125, 255, 0.15);
    }

    .badge-new {
      position: absolute;
      top: 4px;
      right: 4px;
      background: #ff4444;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 5px;
      padding: 3px 5px;
      border-radius: 3px;
      letter-spacing: 0.5px;
      z-index: 2;
    }

    .item-image {
      background: #fafafa;
      border-radius: 6px;
      padding: 8px;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 6px;
      position: relative;
    }
    .item-image img {
      width: 90%;
      height: 90%;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .owned-check {
      position: absolute;
      top: 4px;
      right: 4px;
      background: #111;
      color: #fff;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    .item-name {
      font-size: 11px;
      color: #333;
      margin-bottom: 6px;
      line-height: 1.3;
      min-height: 30px;
    }
    .item-price {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: #f8f8f8;
      border: 1.5px solid #eee;
      padding: 4px 6px;
      border-radius: 5px;
    }
    .item-price img {
      width: 14px;
      height: auto;
      image-rendering: pixelated;
    }
    .item-price-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #111;
    }
    .price-owned {
      background: #f0f0f0;
      color: #999;
    }
    .price-owned .item-price-text { color: #999; }

    /* 미리보기 중일 때만 나타나는 구매바 (하단 네비 바로 위, 가로 중앙) */
    .buy-bar {
      display: none;
      justify-content: center;
      padding: 10px 0;
      border-top: 1.5px solid #eee;
      flex-shrink: 0;
    }
    .buy-bar.show { display: flex; }
    .buy-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: #fff;
      background: #111;
      border: none;
      padding: 10px 18px;
      border-radius: 20px;
      cursor: pointer;
    }
    .buy-btn:active { background: #333; }
    .buy-btn img {
      width: 14px;
      height: auto;
      image-rendering: pixelated;
    }

    /* 하단 네비 (예진님과 완전 동일) */
    .bottomnav {
      background: #fff;
      border-top: 1.5px solid #eee;
      display: flex;
      padding: 14px 0 20px;
      flex-shrink: 0;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 4px 0;
      color: #bbb;
    }
    .nav-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
    }
    .nav-item.active { color: #111; }
    .nav-item.active .nav-label { color: #111; }
  </style>
</head>
<body>
  <div class="phone">
    <!-- 상단 -->
    <div class="topbar">
      <div class="topbar-title">SHOP</div>
      <div class="balance">
        <img id="balance-icon" src="/images/chalk_piece.png" alt="쵸크">
        <span class="balance-text">×<span id="balance-count">128</span></span>
      </div>
    </div>

    <!-- 나비 미리보기 (스크롤 밖에 고정) -->
    <div class="preview">
      <div class="nabi-canvas" id="nabi-canvas">
        <img class="layer-base" id="nabi-base" src="/images/nabi_front_01_basic.png" alt="나비">
        <!-- 착용중인 아이템 레이어가 JS로 여기에 추가됨 -->
      </div>
    </div>

    <!-- 스크롤 영역 -->
    <div class="scroll-area">
      <div class="pills" id="pills">
        <div class="pill active" data-category="all">ALL</div>
        <div class="pill" data-category="top">TOP</div>
        <div class="pill" data-category="bottom">BOTTOM</div>
        <div class="pill" data-category="shoes">SHOES</div>
        <div class="pill" data-category="head">HEAD</div>
        <div class="pill" data-category="etc">ETC</div>
      </div>

      <div class="grid" id="grid"></div>
    </div>

    <!-- 미리보기 중일 때만 뜨는 구매 버튼 (하단 네비 위) -->
    <div class="buy-bar" id="buy-bar">
      <button class="buy-btn" id="buy-btn" onclick="confirmPurchase()">
        <span id="buy-btn-label">구매하기</span>
        <img src="/images/chalk_piece.png" alt="">
        <span id="buy-btn-price"></span>
      </button>
    </div>

  <script>
    // ── 잔액 ──────────────────────
    let balance = 128
    function updateBalance() {
      document.getElementById('balance-count').textContent = balance
      const icon = document.getElementById('balance-icon')
      icon.src = balance >= 100 ? '/images/chalk_bag.png' : '/images/chalk_piece.png'
    }

    // ── 나비 캐릭터: 로그인 유저 정보와 동기화 ──────────
    // TODO(백엔드 연동): loadUserProfile()이 /api/user/me 같은 엔드포인트를 호출해
    // { level, outfit }을 받아오도록 fetch URL/응답 형태만 맞추면 됨.
    // 엔드포인트 준비 전까지는 localStorage 값으로 폴백함.
    let userLevel = parseInt(localStorage.getItem('userLevel') || '1')
    // 예: { top: 1, shoes: 12, etc: [3, 8] }
    let outfit = JSON.parse(localStorage.getItem('outfit') || '{}')

    async function loadUserProfile() {
      const token = localStorage.getItem('token') // 로그인 시 저장하는 키 이름에 맞게 조정
      if (!token) return // 비로그인 상태면 localStorage 값 그대로 사용
      try {
        const res = await fetch('/api/user/me', {
          headers: { Authorization: `Bearer ${token}` }
        })
        if (!res.ok) return // 엔드포인트 없으면 조용히 폴백
        const data = await res.json() // 기대 형태: { level: 1~5, outfit: {...} }
        if (data.level) userLevel = data.level
        if (data.outfit) outfit = data.outfit
      } catch (err) {
        console.warn('유저 정보 동기화 실패, localStorage 값 사용', err)
      }
    }

    // ── 아이템 ────────────────────
    // overlay: 나비에게 입혔을 때 겹쳐 보여줄 이미지 (fitting.html과 동일한 네이밍 규칙: {아이템명}_on_nabi.png)
    const items = [
      { id: 1,  category: 'top',    slot: 'top', image: '/images/top_white_tshirt.png',           overlay: '/images/top_white_tshirt_on_nabi.png',           name: '화이트 티셔츠',       price: 12, owned: false, isNew: false },
      { id: 2,  category: 'top',    slot: 'top', image: '/images/top_navy_crop.png',              overlay: '/images/top_navy_crop_on_nabi.png',              name: '네이비 크롭탑',       price: 15, owned: false, isNew: true  },
      { id: 3,  category: 'etc',    slot: 'chalkbag', image: '/images/chalkbag_square_white.png',      overlay: '/images/chalkbag_square_white_on_nabi.png',      name: '스퀘어 초크백 화이트', price: 20, owned: false, isNew: false },
      { id: 4,  category: 'etc',    slot: 'chalkbag', image: '/images/chalkbag_square_yellow.png',     overlay: '/images/chalkbag_square_yellow_on_nabi.png',     name: '스퀘어 초크백 옐로우', price: 22, owned: false, isNew: false },
      { id: 5,  category: 'etc',    slot: 'chalkbag', image: '/images/chalkbag_round_black.png',       overlay: '/images/chalkbag_round_black_on_nabi.png',       name: '라운드 초크백 블랙',   price: 18, owned: false, isNew: true  },
      { id: 6,  category: 'etc',    slot: 'chalkbag', image: '/images/chalkbag_round_khaki.png',       overlay: '/images/chalkbag_round_khaki_on_nabi.png',       name: '라운드 초크백 카키',   price: 18, owned: false, isNew: false },
      { id: 7,  category: 'etc',    slot: 'chalkbag', image: '/images/chalkbag_round_pink.png',        overlay: '/images/chalkbag_round_pink_on_nabi.png',        name: '라운드 초크백 핑크',   price: 20, owned: false, isNew: true  },
      { id: 8,  category: 'etc',    slot: 'brush', image: '/images/item_brush_short.png',           overlay: '/images/item_brush_short_on_nabi.png',           name: '숏 브러시',           price: 8,  owned: false, isNew: false },
      { id: 9,  category: 'etc',    slot: 'brush', image: '/images/item_brush_long.png',            overlay: '/images/item_brush_long_on_nabi.png',            name: '롱 브러시',           price: 10, owned: false, isNew: false },
      { id: 10, category: 'etc',    slot: 'hand', image: '/images/item_tripod.png',                overlay: '/images/item_tripod_on_nabi.png',                name: '기록용 삼각대',       price: 30, owned: false, isNew: false },
      { id: 11, category: 'etc',    slot: 'hand', image: '/images/item_americano.png',             overlay: '/images/item_americano_on_nabi.png',             name: '아이스 아메리카노',   price: 5,  owned: false, isNew: false },
      { id: 12, category: 'shoes',  slot: 'shoes', image: '/images/climbingshoes_black_gray.png',   overlay: '/images/climbingshoes_black_gray_on_nabi.png',   name: '클라이밍화 블랙',     price: 35, owned: false, isNew: false },
      { id: 13, category: 'shoes',  slot: 'shoes', image: '/images/climbingshoes_gray_blue.png',    overlay: '/images/climbingshoes_gray_blue_on_nabi.png',    name: '클라이밍화 블루',     price: 35, owned: false, isNew: true  },
      { id: 14, category: 'shoes',  slot: 'shoes', image: '/images/climbingshoes_white_pink.png',   overlay: '/images/climbingshoes_white_pink_on_nabi.png',   name: '클라이밍화 핑크',     price: 38, owned: false, isNew: true  },
      { id: 15, category: 'shoes',  slot: 'shoes', image: '/images/climbingshoes_yellow_brown.png', overlay: '/images/climbingshoes_yellow_brown_on_nabi.png', name: '클라이밍화 브라운',   price: 32, owned: false, isNew: false },
      { id: 16, category: 'shoes',  slot: 'shoes', image: '/images/climbingshoes_yellow_green.png', overlay: '/images/climbingshoes_yellow_green_on_nabi.png', name: '클라이밍화 그린',     price: 32, owned: false, isNew: false },
      { id: 17, category: 'head',   slot: 'head', image: '/images/head_accessory_blue_beret.png',  overlay: '/images/head_accessory_blue_beret_on_nabi.png',  name: '블루 베레',           price: 12, owned: false, isNew: true  },
      { id: 18, category: 'head',   slot: 'head', image: '/images/head_accessory_crown.png',       overlay: '/images/head_accessory_crown_on_nabi.png',       name: '왕관',               price: 50, owned: false, isNew: true  },
      { id: 19, category: 'head',   slot: 'head', image: '/images/head_accessory_party_cone.png',  overlay: '/images/head_accessory_party_cone_on_nabi.png',  name: '파티 콘',            price: 8,  owned: false, isNew: true  },
    ]

    let currentCategory = 'all'
    // 지금 미리 입어보고 있는(구매 확정 전) 아이템 id. 한 번에 1개만 유지.
    // 미리보기(구매 확정 전) 중인 아이템들. 슬롯별로 하나씩 → 여러 슬롯 동시 미리보기 가능
    // 예: { top: 2, shoes: 14 }
    let previewBySlot = {}

    // 미리보기 중인 아이템 id 목록
    function previewIds() {
      return Object.values(previewBySlot)
    }

    // 해당 아이템이 자기 슬롯에 실제로 착용중인지 확인
    function isWorn(item) {
      return outfit[item.slot] === item.id
    }

    function render() {
      const grid = document.getElementById('grid')
      const filtered = currentCategory === 'all' ? items : items.filter(i => i.category === currentCategory)
      grid.innerHTML = filtered.map(item => {
        const worn = item.owned && isWorn(item)
        const previewing = previewBySlot[item.slot] === item.id
        return `
        <div class="item ${item.owned ? 'owned' : ''} ${worn ? 'worn' : ''} ${previewing ? 'previewing' : ''}" onclick="onItemClick(${item.id})">
          ${item.isNew && !item.owned ? '<div class="badge-new">NEW</div>' : ''}
          <div class="item-image">
            <img src="${item.image}" alt="${item.name}">
            ${item.owned ? '<div class="owned-check">✓</div>' : ''}
          </div>
          <div class="item-name">${item.name}</div>
          <div class="item-price ${item.owned ? 'price-owned' : ''}">
            ${item.owned
              ? `<span class="item-price-text">${worn ? '착용중' : '탭하여 착용'}</span>`
              : `<img src="/images/chalk_piece.png" alt=""><span class="item-price-text">×${item.price}</span>`}
          </div>
        </div>
      `}).join('')
    }

    document.getElementById('pills').addEventListener('click', (e) => {
      if (!e.target.classList.contains('pill')) return
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'))
      e.target.classList.add('active')
      currentCategory = e.target.dataset.category
      render()
    })

    // ── 아이템 클릭 처리 ────────────────────────────
    // - 보유중: 바로 착용/해제 토글 (구매 절차 없음)
    // - 미보유: 미리보기 토글 + 구매바 노출. 같은 아이템 재클릭 시 미리보기 취소
    function onItemClick(id) {
      const item = items.find(i => i.id === id)
      if (!item) return

      if (item.owned) {
        toggleWorn(item)
        return
      }

      // 같은 아이템 재클릭 → 그 슬롯의 미리보기 해제 / 다른 아이템 → 그 슬롯을 교체
      if (previewBySlot[item.slot] === id) delete previewBySlot[item.slot]
      else previewBySlot[item.slot] = id
      renderNabiPreview()
      renderBuyBar()
      render()
    }

    // 보유 아이템의 실제 착용 상태를 토글하고 저장 (모든 슬롯은 하나만, 교체식)
    function toggleWorn(item) {
      const slot = item.slot
      if (outfit[slot] === item.id) delete outfit[slot] // 같은 걸 다시 누르면 벗기
      else outfit[slot] = item.id                       // 같은 슬롯의 다른 아이템은 자동 교체
      saveOutfit()
      renderNabiPreview()
      render()
    }

    // 구매 확정 시 해당 아이템을 바로 착용 상태로 반영 (슬롯 교체식)
    function equipAfterPurchase(item) {
      outfit[item.slot] = item.id
      saveOutfit()
    }

    function saveOutfit() {
      localStorage.setItem('outfit', JSON.stringify(outfit))
      // TODO(백엔드 연동): PUT /api/user/outfit 같은 엔드포인트로 교체하면
      // 서버 DB에도 착용 상태가 저장됨.
    }

    // ── 구매바 표시/숨김 ────────────────────────────
    // 미리보기 중인 아이템이 여러 개면 총액을 보여주고, 누르면 한꺼번에 구매
    function renderBuyBar() {
      const bar = document.getElementById('buy-bar')
      const ids = previewIds()
      if (ids.length === 0) {
        bar.classList.remove('show')
        return
      }
      const total = ids.reduce((sum, id) => {
        const it = items.find(i => i.id === id)
        return sum + (it ? it.price : 0)
      }, 0)
      const label = ids.length > 1 ? `${ids.length}개 구매하기` : `구매하기`
      document.getElementById('buy-btn-label').textContent = label
      document.getElementById('buy-btn-price').textContent = `×${total}`
      bar.classList.add('show')
    }

    // 미리보기 중인 아이템들을 한꺼번에 구매 + 착용
    function confirmPurchase() {
      const ids = previewIds()
      if (ids.length === 0) return

      const targets = ids.map(id => items.find(i => i.id === id)).filter(Boolean)
      const total = targets.reduce((sum, it) => sum + it.price, 0)

      if (balance < total) {
        alert(`쵸크가 부족해요!\n필요: ${total} / 보유: ${balance}`)
        return
      }

      balance -= total
      targets.forEach(item => {
        item.owned = true
        equipAfterPurchase(item)
      })
      previewBySlot = {} // 구매 완료 → 미리보기 비우기 (이제 실제 착용 상태로 반영됨)

      updateBalance()
      renderBuyBar()
      renderNabiPreview()
      render()
    }

    // ── 나비에게 보여줄 코디 계산 ────────────────────
    // 실제 outfit은 건드리지 않고, 미리보기 중인 아이템을 얹은 임시 버전만 만든다
    function getDisplayOutfit() {
      const display = JSON.parse(JSON.stringify(outfit))
      // 미리보기 중인 슬롯들을 실제 착용 위에 덮어씌워 보여줌
      for (const [slot, id] of Object.entries(previewBySlot)) {
        display[slot] = id
      }
      return display
    }

    // ── 나비 미리보기 렌더링 ──────────────────────────
    function renderNabiPreview() {
      const canvas = document.getElementById('nabi-canvas')
      document.getElementById('nabi-base').src = `/images/nabi_front_0${userLevel}_basic.png`

      canvas.querySelectorAll('img:not(.layer-base)').forEach(el => el.remove())

      // 슬롯 → 겹침 레이어 클래스 (z-index는 CSS에서 정의)
      const layerMap = {
        bottom: 'layer-bottom', shoes: 'layer-shoes', top: 'layer-top',
        chalkbag: 'layer-chalkbag', brush: 'layer-brush', head: 'layer-head', hand: 'layer-hand'
      }
      const displayOutfit = getDisplayOutfit()

      // 각 슬롯에 하나씩만 착용 → 값이 곧 아이템 id
      for (const [slot, id] of Object.entries(displayOutfit)) {
        const item = items.find(i => i.id === id)
        if (!item || !item.overlay) continue
        const img = document.createElement('img')
        img.src = item.overlay
        img.alt = item.name
        img.className = layerMap[slot] || 'layer-hand'
        img.onerror = () => { img.style.display = 'none' } // overlay 이미지가 아직 없으면 조용히 숨김
        canvas.appendChild(img)
      }
    }

    async function init() {
      await loadUserProfile() // 로그인 유저 정보로 userLevel / outfit 동기화 시도
      updateBalance()
      renderNabiPreview()
      renderBuyBar()
      render()
    }

    init()
  </script>
</body>
</html>
